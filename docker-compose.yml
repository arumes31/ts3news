services:
  db:
    image: postgres:15-alpine
    container_name: ts3-news-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-ts3bot}
      POSTGRES_PASSWORD: ${DB_PASS:-ts3botpass}
      POSTGRES_DB: ${DB_NAME:-ts3news}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ts3bot} -d ${DB_NAME:-ts3news}"]
      interval: 5s
      timeout: 5s
      retries: 5

  ts3-bot:
    build: .
    container_name: ts3-news-bot
    restart: unless-stopped
    ports:
      - "18081:18081"
    # Give the Go supervisor time to finish an in-progress poke cycle on SIGTERM
    # (graceful shutdown) before Docker escalates to SIGKILL.
    stop_grace_period: 30s
    depends_on:
      db:
        condition: service_healthy
    environment:
      - TS3_HOST=${TS3_HOST}
      - TS3_PORT=${TS3_PORT:-9987}
      - TS3_NICKNAME=${TS3_NICKNAME:-MrFree}
      - TS3_IDENTITY=${TS3_IDENTITY}
      - MIN_INTERVAL_HOURS=${MIN_INTERVAL_HOURS:-1}
      - MAX_INTERVAL_HOURS=${MAX_INTERVAL_HOURS:-12}
      - POKE_DELAY_MS=${POKE_DELAY_MS:-1200}
      - REDRX_API_KEY=${REDRX_API_KEY}
      - TS3_TARGET_NICK=${TS3_TARGET_NICK}
      - DATABASE_URL=${DATABASE_URL:-postgres://${DB_USER:-ts3bot}:${DB_PASS:-ts3botpass}@db:5432/${DB_NAME:-ts3news}?sslmode=disable}
    env_file:
      - config.env
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---- Idely: idle-music detector (its own TeamSpeak client) ----
  # Runs the SAME image in Idely-only mode. It needs its own container because the
  # ClientQuery plugin port (25639) is hard-coded and localhost-only, so the Idely
  # client cannot coexist with the poke bot's client in one network namespace.
  # Enable by setting ENABLE_IDELY=true in config.env. IDELY_IDENTITY is optional:
  # when unset, Idely uses its own persistent client profile (see ./data/idely-profile).
  ts3-idely:
    build: .
    container_name: ts3-news-idely
    restart: unless-stopped
    stop_grace_period: 15s
    depends_on:
      db:
        condition: service_healthy
    environment:
      - ENABLE_IDELY=true
      - IDELY_ONLY=true
      - WEB_ENABLE=false
      # Idely uses its own identity/name; reuse the standard client profile in this
      # separate container by mapping the Idely identity onto TS3_IDENTITY.
      - TS3_HOST=${TS3_HOST}
      - TS3_PORT=${TS3_PORT:-9987}
      - TS3_IDENTITY=${IDELY_IDENTITY}
      - TS3_NICKNAME=${IDELY_NICKNAME:-Idely}
      - IDELY_CLIENTQUERY_ADDR=127.0.0.1:25639
      - IDELY_API_URL=${IDELY_API_URL:-http://ts3audiobot:58913}
      - IDELY_API_USER=${IDELY_API_USER}
      - IDELY_API_TOKEN=${IDELY_API_TOKEN}
      - IDELY_BOT_UID=${IDELY_BOT_UID}
      - IDELY_QUERY_USER=${IDELY_QUERY_USER}
      - IDELY_QUERY_PASS=${IDELY_QUERY_PASS}
      - IDELY_QUERY_PORT=${IDELY_QUERY_PORT:-10011}
      - DATABASE_URL=${DATABASE_URL:-postgres://${DB_USER:-ts3bot}:${DB_PASS:-ts3botpass}@db:5432/${DB_NAME:-ts3news}?sslmode=disable}
    env_file:
      - config.env
    volumes:
      # Your own music library: drop audio files into runtime/music (mounted at
      # /audio). Idely scans this directory to build the audio bot's playlist.
      - ./runtime/music:/audio:ro
      # Persist the Idely client's profile (host bind mount) so its identity is
      # stable across restarts. This image runs as root, and the entrypoint seeds
      # the baked golden profile into the empty directory on first run, so a fresh
      # host path still starts a working, license-accepted client.
      - ./data/idely-profile:/root/.ts3client
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---- TS3AudioBot sidecar: the "voice" Idely dispatches to play music ----
  # A separate, community-maintained service that connects to the TS3 server as its
  # own voice client, transmits audio, AND (via the IdelyTalkSensor plugin) tells
  # Idely when a real user is talking. It automatically seeds a working
  # ts3audiobot.toml and rights.toml on first run.
  ts3audiobot:
    image: ancieque/ts3audiobot:latest
    container_name: ts3-news-audiobot
    restart: unless-stopped
    depends_on:
      ts3-idely:
        condition: service_started
    entrypoint:
      - sh
      - -c
      - |
        for f in ts3audiobot.toml rights.toml; do
          if [ ! -f "/app/data/$$f" ] && [ -f "/seed/$$f" ]; then
            cp "/seed/$$f" "/app/data/$$f"
            echo "[audiobot] seeded /app/data/$$f"
          fi
        done
        exec dotnet /app/TS3AudioBot.dll --non-interactive
    volumes:
      # Named volume for the image's working dir (config + db) to avoid Nextcloud locks.
      - ts3audiobot_data:/app/data
      # The game music library and the talk-sensor plugin (compiled at runtime).
      - ./runtime/music:/audio:ro
      - ./runtime/ts3audiobot/plugins:/app/data/plugins:ro
      # Seed templates directory
      - ./runtime/ts3audiobot:/seed:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  ts3audiobot_data:
