# --- Seeded automatically by the ts3audiobot-init container on first run. ---
# Copied into the ts3audiobot_data volume ONLY when no rights.toml exists yet.
#
# This grants all rights to all API callers. It is safe because the TS3AudioBot
# WebAPI port (58913) is not published to the host or internet in docker-compose.yml
# and is only accessible from within the internal Docker network.

[[rule]]
    "+" = "*"
