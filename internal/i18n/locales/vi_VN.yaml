# ─── Content Pools: Zone Lore (atmosphere one-liners) ───

pool.combat.zone_lore.001: "Không khí ở đây rung lên với một ma thuật cổ xưa, đói khát."
pool.combat.zone_lore.002: "Xương khô vụn nát dưới chân bạn. Bạn không phải là người đầu tiên đến đây."
pool.combat.zone_lore.003: "Một cơn gió lạnh mang theo mùi sắt và tro tàn."
pool.combat.zone_lore.004: "Thứ gì đó đang quan sát từ trong bóng tối, kiên nhẫn và không chớp mắt."
pool.combat.zone_lore.005: "Mặt đất rung chuyển theo từng bước chân nặng nề phía xa."
pool.combat.zone_lore.006: "Những tiếng thì thầm mờ nhạt kéo nhẹ nơi thính giác của bạn."
pool.combat.zone_lore.007: "Bóng tối hội tụ một cách kỳ lạ giữa những phiến đá vỡ."
pool.combat.zone_lore.008: "Ngay cả ánh sáng cũng có vẻ e ngại khi bước vào nơi này."
pool.combat.zone_lore.009: "Âm hưởng của một trận chiến cổ xưa vẫn còn vang vọng trong tĩnh lặng."
pool.combat.zone_lore.010: "Hơi thở của bạn hóa sương mù; cái lạnh ở đây cắt da thịt hơn cả thép."

