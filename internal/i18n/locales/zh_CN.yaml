# ─── Content Pools: Zone Lore (atmosphere one-liners) ───

pool.combat.zone_lore.001: "这里的空气中弥漫着古老而饥渴的魔法。"
pool.combat.zone_lore.002: "靴子下白骨碎裂声不断。你不是第一个来到这里的人。"
pool.combat.zone_lore.003: "冷风中带着铁和灰烬的味道。"
pool.combat.zone_lore.004: "阴影中有东西在注视着，耐心且目不转睛。"
pool.combat.zone_lore.005: "大地随着远处沉重的脚步声而震颤。"
pool.combat.zone_lore.006: "微弱的耳语牵动着你的听觉边缘。"
pool.combat.zone_lore.007: "阴影在破碎的石块间奇异地聚集。"
pool.combat.zone_lore.008: "连光线似乎都不愿进入这个地方。"
pool.combat.zone_lore.009: "古老战斗的回响仍在寂静中回荡。"
pool.combat.zone_lore.010: "你的呼吸化作雾气；这里的寒冷比钢铁还要刺骨。"

