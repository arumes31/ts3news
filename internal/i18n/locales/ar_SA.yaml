# ─── Content Pools: Zone Lore (atmosphere one-liners) ───

pool.combat.zone_lore.001: "الهواء هنا يهمس بسحر قديم جائع."
pool.combat.zone_lore.002: "تتحطم العظام تحت حذائك. لست أول من يأتي إلى هنا."
pool.combat.zone_lore.003: "تحمل الرياح الباردة رائحة الحديد والرماد."
pool.combat.zone_lore.004: "شيء ما يراقب من الظلال، صبور ولا يرمش."
pool.combat.zone_lore.005: "تتزلزل الأرض مع كل خطوة ثقيلة بعيدة."
pool.combat.zone_lore.006: "همسات خافتة تشد أطراف سمعك."
pool.combat.zone_lore.007: "تتجمع الظلال بشكل غريب بين الحجارة المكسورة."
pool.combat.zone_lore.008: "يبدو أن الضوء نفسه يتردد في الدخول إلى هنا."
pool.combat.zone_lore.009: "أصداء معركة قديمة لا تزال تتردد في الصمت."
pool.combat.zone_lore.010: "يتصاعد بخار أنفاسك؛ البرد هنا يلسع أعمق من الفولاذ."

