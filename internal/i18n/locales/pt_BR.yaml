web.abyss.title: "🕳️ O Abismo"
web.abyss.hero_desc: "Uma masmorra sem fundo que coloca seu personagem real — equipamento, habilidades, suprema, mascotes, poções e tudo mais — contra horrores cada vez mais profundos. Limpe um andar para aumentar seu tesouro retido e então escolha: descer mais ou depositá-lo antes que a escuridão o engula. Se morrer, o tesouro é perdido — a menos que você tenha feito um seguro dele ou aposte em uma ressurreição."
web.abyss.weekly_title: "📅 Afixo do Desafio Diário:"
web.abyss.weekly.double_hazards: "⚠️ Perigos Dobrados (Dano dos perigos da zona dobrado!)"
