# ─── Content Pools: Zone Lore (atmosphere one-liners) ───

pool.combat.zone_lore.001: "O ar aqui vibra com uma magia antiga e faminta."
pool.combat.zone_lore.002: "Ossos estalam sob os pés. Você não é o primeiro a vir aqui."
pool.combat.zone_lore.003: "Um vento frio carrega o cheiro de ferro e cinzas."
pool.combat.zone_lore.004: "Algo observa da escuridão, paciente e sem piscar."
pool.combat.zone_lore.005: "O chão treme a cada passo distante e pesado."
pool.combat.zone_lore.006: "Sussurros fracos puxam a beira da sua audição."
pool.combat.zone_lore.007: "As sombras se acumulam de forma estranha entre as pedras quebradas."
pool.combat.zone_lore.008: "A própria luz parece relutante em entrar neste lugar."
pool.combat.zone_lore.009: "Ecos de uma batalha antiga ainda permanecem no silêncio."
pool.combat.zone_lore.010: "Sua respiração congela; o frio aqui morde mais fundo que o aço."

