web.abyss.weekly.glass_cannon: "💥 Canhão de Vidro (Os andares são 30% mais letais — mas pagam 30% a mais ao seu cofre!)"
web.abyss.weekly.gold_rush: "💰 Corrida do Ouro (Os ganhos do cofre de cada andar concluído são dobrados!)"
web.abyss.weekly.iron_skin: "🛡️ Pele de Ferro (Cada golpe que você recebe é reduzido em 30% — mas os pagamentos do cofre caem 10%!)"
