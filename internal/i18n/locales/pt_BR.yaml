web.abyss.weekly.execute: "🗡️ Execução (Seus golpes causam 50% mais dano a inimigos abaixo de 30% de HP!)"
web.abyss.weekly.vampiric_mobs: "🧛 Inimigos Vampíricos (Inimigos se curam em 15% do dano causado — mas os pagamentos do cofre sobem 15%!)"
