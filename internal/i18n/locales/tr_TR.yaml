pool.combat.zone_lore.001: "Buradaki hava eski, aç bir büyüyle inliyor."
pool.combat.zone_lore.002: "Kemikler ayak altında eziliyor. Bu yoldan geçen ilk kişi sen değilsin."
pool.combat.zone_lore.003: "Soğuk bir rüzgar demir ve kül kokusu taşıyor."
pool.combat.zone_lore.004: "Karanlıktan bir şey izliyor, sabırlı ve gözlerini kırpmadan."
pool.combat.zone_lore.005: "Yer, her uzak ve ağır adımda titriyor."
pool.combat.zone_lore.006: "Zayıf fısıltılar işitme sınırını zorluyor."
pool.combat.zone_lore.007: "Gölgeler kırık taşlar arasında doğal olmayan bir şekilde birikiyor."
pool.combat.zone_lore.008: "Işık bile bu yere girmeye isteksiz görünüyor."
pool.combat.zone_lore.009: "Kadim bir savaşın yankıları hala sessizlikte asılı kalıyor."
pool.combat.zone_lore.010: "Nefesin buğulanıyor; buradaki soğuk çelikten daha derin ısırıyor."

