# ─── Content Pools: Zone Lore (atmosphere one-liners) ───

pool.combat.zone_lore.001: "ここの空気は古く飢えた魔力で唸っている。"
pool.combat.zone_lore.002: "足元で骨が砕ける。ここに来たのは君が最初ではない。"
pool.combat.zone_lore.003: "冷たい風が鉄と灰の匂いを運んでくる。"
pool.combat.zone_lore.004: "何かが闇の中から、辛抱強くまばたきもせず見つめている。"
pool.combat.zone_lore.005: "遠く重い足音のたびに地面が震える。"
pool.combat.zone_lore.006: "かすかな囁きが聴覚の端を引っ張る。"
pool.combat.zone_lore.007: "砕けた石の間に影が不自然に溜まっている。"
pool.combat.zone_lore.008: "光さえもこの場所に入るのをためらっているようだ。"
pool.combat.zone_lore.009: "古の戦いの残響が今も静寂に漂っている。"
pool.combat.zone_lore.010: "吐く息が凍る。ここの寒さは鋼よりも深く噛みつく。"

