# ─── Content Pools: Zone Lore (atmosphere one-liners) ───

pool.combat.zone_lore.001: "Vzduch zde hučí starou, hladovou magií."
pool.combat.zone_lore.002: "Kosti křupou pod nohama. Nejsi první, kdo tudy kráčí."
pool.combat.zone_lore.003: "Studený vítr přináší pach železa a popela."
pool.combat.zone_lore.004: "Něco tě sleduje z temnoty, trpělivě a bez mrknutí."
pool.combat.zone_lore.005: "Země se třese s každým vzdáleným, těžkým krokem."
pool.combat.zone_lore.006: "Slabé šeptání tě tahá za hranici tvého sluchu."
pool.combat.zone_lore.007: "Stíny se nepřirozeně hromadí mezi rozbitými kameny."
pool.combat.zone_lore.008: "Samotné světlo se zdá zdráhat vstoupit na toto místo."
pool.combat.zone_lore.009: "Ozvěny starodávné bitvy stále přetrvávají v tichu."
pool.combat.zone_lore.010: "Tvůj dech se mlží; zdejší chlad kouše hlouběji než ocel."

