# ─── Content Pools: Zone Lore (atmosphere one-liners) ───

pool.combat.zone_lore.001: "Воздух здесь вибрирует от древней, голодной магии."
pool.combat.zone_lore.002: "Под ногами хрустят кости. Вы не первый, кто проходит этот путь."
pool.combat.zone_lore.003: "Холодный ветер приносит запах железа и пепла."
pool.combat.zone_lore.004: "Кто-то наблюдает из тьмы, терпеливо и не мигая."
pool.combat.zone_lore.005: "Земля дрожит при каждом далеком тяжелом шаге."
pool.combat.zone_lore.006: "Слабый шепот терзает слух на грани восприятия."
pool.combat.zone_lore.007: "Тени неестественно сгущаются между разбитыми камнями."
pool.combat.zone_lore.008: "Кажется, сам свет неохотно проникает в это место."
pool.combat.zone_lore.009: "Эхо древней битвы все еще витает в тишине."
pool.combat.zone_lore.010: "Ваше дыхание превращается в пар; холод здесь кусает глубже стали."

