# ─── Content Pools: Zone Lore (atmosphere one-liners) ───

pool.combat.zone_lore.001: "L'air ici vibre d'une magie ancienne et affamée."
pool.combat.zone_lore.002: "Les os craquent sous tes pas. Tu n'es pas le premier à venir."
pool.combat.zone_lore.003: "Un vent froid porte l'odeur du fer et de la cendre."
pool.combat.zone_lore.004: "Quelque chose observe depuis l'ombre, patient et sans ciller."
pool.combat.zone_lore.005: "Le sol tremble à chaque pas lointain et lourd."
pool.combat.zone_lore.006: "De faibles murmures tirent au bord de ton ouïe."
pool.combat.zone_lore.007: "Les ombres s'amassent étrangement entre les pierres brisées."
pool.combat.zone_lore.008: "La lumière elle-même semble réticente à entrer ici."
pool.combat.zone_lore.009: "Les échos d'une bataille ancienne résonnent encore dans le silence."
pool.combat.zone_lore.010: "Ton souffle givre ; le froid ici mord plus profond que l'acier."

