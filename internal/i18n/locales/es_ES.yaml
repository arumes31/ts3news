pool.combat.zone_lore.001: El aire aquí vibra con una magia vieja y hambrienta.
pool.combat.zone_lore.002: Los huesos crujen bajo tus pies. No eres el primero en
  venir.
pool.combat.zone_lore.003: Un viento frío trae olor a hierro y ceniza.
pool.combat.zone_lore.004: Algo observa desde la oscuridad, paciente y sin parpadear.
pool.combat.zone_lore.005: El suelo tiembla con cada paso lejano y pesado.
pool.combat.zone_lore.006: Susurros débiles tiran del borde de tu oído.
pool.combat.zone_lore.007: Las sombras se acumulan de forma antinatural entre las
  piedras rotas.
pool.combat.zone_lore.008: La luz misma parece reacia a entrar en este lugar.
pool.combat.zone_lore.009: Ecos de una batalla antigua aún perduran en el silencio.
pool.combat.zone_lore.010: Tu aliento se congela; el frío aquí muerde más que el acero.
