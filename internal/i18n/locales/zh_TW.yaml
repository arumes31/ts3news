# ─── Content Pools: Zone Lore (atmosphere one-liners) ───

pool.combat.zone_lore.001: "這裡的空氣迴盪著古老而飢渴的魔力。"
pool.combat.zone_lore.002: "腳下傳來白骨碎裂聲。你並非首個踏足此地之人。"
pool.combat.zone_lore.003: "寒風帶來了鐵鏽與灰燼的味道。"
pool.combat.zone_lore.004: "黑暗中有某種生物正注視著你，耐心且不帶憐憫。"
pool.combat.zone_lore.005: "隨著遠處沉重的腳步聲，地面微微震顫。"
pool.combat.zone_lore.006: "耳邊迴響著若有似無的呢喃聲。"
pool.combat.zone_lore.007: "斷壁殘垣間，陰影正以不尋常的方式匯聚。"
pool.combat.zone_lore.008: "就連光線似乎也不願照進這個鬼地方。"
pool.combat.zone_lore.009: "遠古戰鬥的殘留氣息依然縈繞在靜默中。"
pool.combat.zone_lore.010: "你的呼氣化作白霧；此處的寒冷比鋼鐵更具侵略性。"

