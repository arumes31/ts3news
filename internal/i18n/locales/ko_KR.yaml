# ─── Content Pools: Zone Lore (atmosphere one-liners) ───

pool.combat.zone_lore.001: "이곳의 공기는 오래되고 굶주린 마법으로 윙윙거린다."
pool.combat.zone_lore.002: "발밑에서 뼈가 으스러진다. 이곳에 온 것은 당신이 처음이 아니다."
pool.combat.zone_lore.003: "차가운 바람이 쇠와 재의 냄새를 실어 온다."
pool.combat.zone_lore.004: "무언가가 어둠 속에서 참을성 있게 깜빡임도 없이 지켜본다."
pool.combat.zone_lore.005: "멀리서 묵직한 발걸음마다 땅이 흔들린다."
pool.combat.zone_lore.006: "희미한 속삭임이 청각의 가장자리를 잡아당긴다."
pool.combat.zone_lore.007: "부서진 돌 사이로 그림자가 부자연스럽게 고인다."
pool.combat.zone_lore.008: "빛조차 이곳에 들어오기를 꺼리는 듯하다."
pool.combat.zone_lore.009: "고대 전투의 메아리가 아직도 정적 속에 맴돈다."
pool.combat.zone_lore.010: "숨결이 얼어붙는다. 이곳의 추위는 강철보다 깊게 파고든다."

