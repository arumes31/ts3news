# ─── Content Pools: Zone Lore (atmosphere one-liners) ───

pool.combat.zone_lore.001: "L'aria qui vibra di una magia antica e affamata."
pool.combat.zone_lore.002: "Le ossa scricchiolano sotto i piedi. Non sei il primo a venire qui."
pool.combat.zone_lore.003: "Un vento freddo porta odore di ferro e cenere."
pool.combat.zone_lore.004: "Qualcosa osserva dal buio, paziente e senza batter ciglio."
pool.combat.zone_lore.005: "Il terreno trema a ogni passo lontano e pesante."
pool.combat.zone_lore.006: "Deboli sussurri tirano al limite del tuo udito."
pool.combat.zone_lore.007: "Le ombre si raccolgono in modo innaturale tra le pietre spezzate."
pool.combat.zone_lore.008: "Persino la luce sembra restia a entrare in questo luogo."
pool.combat.zone_lore.009: "Echi di un'antica battaglia indugiano ancora nel silenzio."
pool.combat.zone_lore.010: "Il tuo respiro si gela; il freddo qui morde più a fondo dell'acciaio."

