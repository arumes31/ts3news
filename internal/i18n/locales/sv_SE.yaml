pool.combat.zone_lore.001: Luften här surrar av en gammal, hungrig magi.
pool.combat.zone_lore.002: Ben kraschar under dina stövlar. Du är inte den första
  som kommer hit.
pool.combat.zone_lore.003: En kall vind bär doften av järn och aska.
pool.combat.zone_lore.004: Något vakar från skuggorna, tålmodigt och utan att blinka.
pool.combat.zone_lore.005: Marken darrar med varje avlägset, tungt steg.
pool.combat.zone_lore.006: Svaga viskningar drar i kanten av din hörsel.
pool.combat.zone_lore.007: Skuggor samlas märkligt mellan de trasiga stenarna.
pool.combat.zone_lore.008: Ljuset självt verkar ovilligt att gå in här.
pool.combat.zone_lore.009: Ekon av en forntida strid ringer fortfarande i tystnaden.
pool.combat.zone_lore.010: Din andedräkt immar; kylan här biter djupare än stål.
