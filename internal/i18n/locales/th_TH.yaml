pool.combat.zone_lore.001: "อากาศที่นี่สั่นสะเทือนด้วยมนตราเก่าแก่ที่หิวกระหาย"
pool.combat.zone_lore.002: "กระดูกแตกละเอียดใต้รองเท้าบูทของคุณ คุณไม่ใช่คนแรกที่มาที่นี่"
pool.combat.zone_lore.003: "ลมหนาวพัดพาเอากลิ่นเหล็กและเถ้าถ่านมา"
pool.combat.zone_lore.004: "บางอย่างเฝ้ามองจากเงามืด อย่างอดทนและไม่กะพริบตา"
pool.combat.zone_lore.005: "พื้นดินสั่นสะเทือนตามจังหวะก้าวเดินอันหนักหน่วงที่อยู่ห่างออกไป"
pool.combat.zone_lore.006: "เสียงกระซิบแผ่วเบาดึงรั้งโสตประสาทของคุณ"
pool.combat.zone_lore.007: "เงามืดรวมตัวกันอย่างประหลาดระหว่างหินที่แตกหัก"
pool.combat.zone_lore.008: "แม้แต่แสงสว่างเองก็ดูเหมือนจะลังเลที่จะเข้ามาที่นี่"
pool.combat.zone_lore.009: "เสียงสะท้อนของการต่อสู้โบราณยังคงดังก้องในความเงียบ"
pool.combat.zone_lore.010: "ลมหายใจของคุณกลายเป็นไอ ความหนาวเหน็บที่นี่บาดลึกยิ่งกว่าเหล็กกล้า"

