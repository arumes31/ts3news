# ─── Content Pools: Zone Lore (atmosphere one-liners) ───

pool.combat.zone_lore.001: "Die Luft hier summt vor alter, hungriger Magie."
pool.combat.zone_lore.002: "Knochen knirschen unter den Füßen. Du bist nicht der Erste hier."
pool.combat.zone_lore.003: "Ein kalter Wind trägt den Geruch von Eisen und Asche."
pool.combat.zone_lore.004: "Etwas beobachtet aus dem Dunkel, geduldig und ohne zu blinzeln."
pool.combat.zone_lore.005: "Der Boden bebt bei jedem fernen, schweren Schritt."
pool.combat.zone_lore.006: "Leises Flüstern zerrt am Rande deines Gehörs."
pool.combat.zone_lore.007: "Schatten sammeln sich unnatürlich zwischen den zerbrochenen Steinen."
pool.combat.zone_lore.008: "Selbst das Licht scheint diesen Ort zu meiden."
pool.combat.zone_lore.009: "Echos einer uralten Schlacht hallen noch in der Stille."
pool.combat.zone_lore.010: "Dein Atem gefriert; die Kälte hier beißt tiefer als Stahl."

