greeting.058: "बैकलॉग ढेर करो!"
greeting.059: "नौसिखिया मत बनो, इसे लो!"
greeting.060: "दावा बटन तक स्पीडरन!"
greeting.061: "मुफ़्त गेम, MrFree की ओर से!"
greeting.062: "बफ़ आ रहे हैं: मुफ़्त गेम!"
greeting.063: "दिन की लूट ड्रॉप!"
greeting.064: "तुम्हारी इन्वेंट्री में जगह है, है ना?"
greeting.065: "गेम ऑन, मुफ़्त में!"
greeting.066: "कोई मेहनत नहीं, बस दावा करो!"
greeting.067: "मुफ़्त गेम, गर्म और तैयार!"
greeting.068: "विशेष डिलीवरी, गेमर!"
greeting.069: "इस मुफ़्तिया को अनलॉक करो!"
greeting.070: "लूट के लिए पासा घुमाओ... तुम जीते!"
greeting.071: "अकेले जाना खतरनाक है, ये लो!"
greeting.072: "जंगल में मुफ़्त गेम देखा!"
greeting.073: "उठाओ, यह मुफ़्त रियल एस्टेट है!"
greeting.074: "दैनिक लूट आ गई है!"
greeting.075: "मुफ़्त गेम, ज़ीरो कूलडाउन!"
greeting.076: "अभी दावा करो, बाद में शुक्रिया कहना!"
greeting.077: "गेमिंग देवताओं का उपहार:"
greeting.078: "इस मुफ़्तिया पर स्टार्ट दबाएं!"
greeting.079: "आज तुम्हारी किस्मत का आँकड़ा ऊंचा है!"
greeting.080: "मुफ़्त गेम, कोई शर्त नहीं!"
greeting.081: "सब कुछ छोड़ो, मुफ़्त गेम!"
greeting.082: "स्टॉन्क्स! मुफ़्त गेम संस्करण।"
greeting.083: "लूट आ रही है, संभल जाओ!"
greeting.084: "अपनी लाइब्रेरी खोलो, ये रही लूट!"
greeting.085: "मुफ़्त गेम, अभी-अभी पैदा हुआ!"
greeting.086: "अंदर आओ, लूट मुफ़्त है!"
greeting.087: "तुम्हारे बटुए के लिए बड़ी W!"
greeting.088: "इस मुफ़्तिया पर तुम्हारा नाम है!"
greeting.089: "तुम्हारी बैकलॉग के लिए हीलिंग पोशन:"
greeting.090: "मुफ़्त गेम, प्रमाणित महाकाव्य!"
greeting.091: "ले लो, यह गिवअवे का समय है!"
greeting.092: "संग्रह के लिए नई प्रविष्टि!"
greeting.093: "मुफ़्त गेम, सीधे इन्वेंट्री में!"
greeting.094: "खज़ाना मिला!"
greeting.095: "गेमर अलर्ट: मुफ़्त लूट!"
greeting.096: "टाइमर खत्म होने से पहले दावा करो!"
greeting.097: "तुम्हारा मुफ़्त गेम आ गया है!"
greeting.098: "लूट सुरक्षित? लगभग, दावा करो!"
greeting.099: "मुफ़्त गेम, कोई झूठ नहीं!"
greeting.100: "ये रहा मुफ़्तिया, तुम लेजेंड!"

