hazard.deadly_radiation.desc: "ज़हरीला विकिरण धीरे-धीरे स्वास्थ्य और जीवन शक्ति को खत्म करता है"
hazard.treacherous_quicksand.desc: "धंसने वाली रेत हिलना मुश्किल और थकाने वाला बनाती है"
hazard.cursed_aura.desc: "एक काली ऊर्जा प्रवेश करने वाले सभी की शक्ति और इच्छाशक्ति को चूसती है"
hazard.arcane_vortex.desc: "जादू की ऊर्जा का घूमता भंवर जादू और कौशल को बाधित करता है"

