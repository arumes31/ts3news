# ─── Abyss Web UI ───
web.abyss.title: "🕳️ रसातल"
web.abyss.hero_desc: "एक अतल कालकोठरी जहाँ आपका असली पात्र — उपकरण, कौशल, अल्टीमेट, पालतू जानवर, औषधियाँ — बढ़ती गहराइयों के भयावह राक्षसों से लड़ता है। एक मंजिल साफ करें और अपना जमा खजाना बढ़ाएं, फिर चुनें: और नीचे उतरें या अंधेरे के लेने से पहले निकाल लें। मरने पर खजाना खो जाता है — जब तक कि आपने उसका बीमा न कराया हो या पुनर्जीवन का दांव न लगाएं।"
web.abyss.weekly_title: "📅 दैनिक चुनौती एफिक्स:"
web.abyss.weekly.double_hazards: "⚠️ दोहरे खतरे (क्षेत्र खतरे का नुकसान दोगुना!)"
web.abyss.weekly.zero_durability_loss: "🛡️ शून्य टिकाऊपन हानि (उपकरण खराब नहीं होते!)"
web.abyss.weekly.enraged_mobs: "🔥 क्रोधित राक्षस (हर मंजिल पर क्रोधित दुश्मन!)"
web.abyss.weekly.glass_cannon: "💥 ग्लास कैनन (मंज़िलें 30% अधिक घातक — लेकिन आपके कैश में 30% अधिक देती हैं!)"
web.abyss.weekly.gold_rush: "💰 गोल्ड रश (हर साफ़ की गई मंज़िल से एस्क्रो कैश लाभ दोगुना!)"
web.abyss.weekly.iron_skin: "🛡️ लौह त्वचा (आपको लगने वाला हर वार 30% कम हो जाता है — लेकिन कैश भुगतान 10% घट जाते हैं!)"
web.abyss.weekly.bloodlust: "🩸 रक्तपिपासा (दुश्मन को मारने पर आपका 20% अधिकतम HP भर जाता है!)"
web.abyss.weekly.execute: "🗡️ वध (30% HP से कम दुश्मनों पर आपके वार 50% अधिक प्रभावी!)"
web.abyss.weekly.vampiric_mobs: "🧛 रक्तपायी शत्रु (शत्रु अपने द्वारा किए गए नुकसान का 15% भर लेते हैं — लेकिन कैश भुगतान 15% बढ़ जाते हैं!)"
