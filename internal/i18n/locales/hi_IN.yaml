# ─── Content Pools: Zone Lore (atmosphere one-liners) ───

pool.combat.zone_lore.001: "यहाँ की हवा एक प्राचीन, भूखे जादू से गूंजती है।"
pool.combat.zone_lore.002: "हड्डियाँ तुम्हारे जूतों के नीचे चरमरा रही हैं। तुम यहाँ आने वाले पहले व्यक्ति नहीं हो।"
pool.combat.zone_lore.003: "एक ठंडी हवा लोहे और राख की गंध लाती है।"
pool.combat.zone_lore.004: "कुछ छायाओं से देख रहा है, धैर्यवान और बिना पलक झपकाए।"
pool.combat.zone_lore.005: "ज़मीन हर दूर के, भारी कदम के साथ कांपती है।"
pool.combat.zone_lore.006: "हल्की फुसफुसाहटें तुम्हारी सुनने की क्षमता को खींचती हैं।"
pool.combat.zone_lore.007: "टूटे हुए पत्थरों के बीच छायाएं अजीब तरह से जमा होती हैं।"
pool.combat.zone_lore.008: "प्रकाश स्वयं यहाँ प्रवेश करने में संकोच कर रहा है।"
pool.combat.zone_lore.009: "एक प्राचीन युद्ध की गूँज अभी भी सन्नाटे में गूंज रही है।"
pool.combat.zone_lore.010: "तुम्हारी सांसों में धुंध है; यहाँ की ठंड स्टील से भी अधिक गहरी चुभती है।"

