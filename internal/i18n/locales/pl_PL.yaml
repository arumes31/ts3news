# ─── Content Pools: Zone Lore (atmosphere one-liners) ───

pool.combat.zone_lore.001: "Powietrze drży od starożytnej, głodnej magii."
pool.combat.zone_lore.002: "Kości chrupią pod stopami. Nie jesteś pierwszym, który tu przybył."
pool.combat.zone_lore.003: "Zimny wiatr niesie zapach żelaza i popiołu."
pool.combat.zone_lore.004: "Coś obserwuje cię z mroku, cierpliwie i bez mrugnięcia okiem."
pool.combat.zone_lore.005: "Ziemia drży przy każdym odległym, ciężkim kroku."
pool.combat.zone_lore.006: "Słabe szepty szarpią krawędź twojego słuchu."
pool.combat.zone_lore.007: "Cienie gromadzą się nienaturalnie między potrzaskanymi kamieniami."
pool.combat.zone_lore.008: "Nawet światło wydaje się niechętne, by tu wkroczyć."
pool.combat.zone_lore.009: "Echa starożytnej bitwy wciąż pobrzmiewają w ciszy."
pool.combat.zone_lore.010: "Twój oddech zamarza; tutejsze zimno kąsa głębiej niż stal."

