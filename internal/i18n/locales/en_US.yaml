# ─── Content Pools: Zone Lore (atmosphere one-liners) ───

pool.combat.zone_lore.001: "The air here hums with old, hungry magic."
pool.combat.zone_lore.002: "Bones crunch underfoot. You are not the first to come this way."
pool.combat.zone_lore.003: "A cold wind carries the scent of iron and ash."
pool.combat.zone_lore.004: "Something watches from the dark, patient and unblinking."
pool.combat.zone_lore.005: "The ground trembles with each distant, heavy step."
pool.combat.zone_lore.006: "Faint whispers tug at the edge of your hearing."
pool.combat.zone_lore.007: "Shadows pool unnaturally between the broken stones."
pool.combat.zone_lore.008: "The very light seems reluctant to enter this place."
pool.combat.zone_lore.009: "Echoes of an ancient battle still linger in the silence."
pool.combat.zone_lore.010: "Your breath fogs; the cold here bites deeper than steel."

