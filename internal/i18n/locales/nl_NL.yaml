pool.combat.zone_lore.001: De lucht hier zindert van oude, hongerige magie.
pool.combat.zone_lore.002: Botten kraken onder je laarzen. Je bent niet de eerste
  die hier komt.
pool.combat.zone_lore.003: Een koude wind draagt de geur van ijzer en as mee.
pool.combat.zone_lore.004: Iets kijkt toe vanuit de schaduwen, geduldig en zonder
  te knipperen.
pool.combat.zone_lore.005: De grond trilt bij elke verre, zware stap.
pool.combat.zone_lore.006: Zachte fluisteringen trekken aan de rand van je gehoor.
pool.combat.zone_lore.007: Schaduwen verzamelen zich vreemd tussen de gebroken stenen.
pool.combat.zone_lore.008: Het licht zelf lijkt aarzelend om hier binnen te komen.
pool.combat.zone_lore.009: Echo's van een oude strijd klinken nog steeds in de stilte.
pool.combat.zone_lore.010: Je adem beslaat; de kou hier bijt dieper dan staal.
