<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Lunar Lander</title>
<style>
 html,body{margin:0;height:100%;overflow:hidden;background:#06080f;font-family:system-ui,sans-serif;color:#e8ecf5}
 #hud{position:fixed;top:12px;left:12px;font-size:18px;z-index:2;text-shadow:0 1px 3px #000}
 #msg{position:fixed;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;background:rgba(8,10,16,.82);z-index:3;text-align:center}
 #msg h1{font-size:42px;margin:0 0 6px;color:#f4c542}#msg button{margin-top:18px;padding:10px 22px;font-size:18px;border:0;border-radius:8px;background:#7b6cff;color:#fff;cursor:pointer}
 .rw{margin-top:10px;color:#f4c542;font-size:20px}.hub{margin-top:14px;color:#8a93a8;font-size:14px;text-decoration:none}
 #hint{position:fixed;bottom:12px;left:12px;font-size:13px;color:#8a93a8;z-index:2}
</style></head>
<body>
<div id="hud">Score: <span id="score">0</span> · Fuel <span id="fuel">100</span></div>
<div id="hint">Space/↑ thrust · ←/→ steer · land softly on the green pad</div>
<div id="msg"><h1>Crashed</h1><div id="sub"></div><div id="reward" class="rw"></div><button onclick="restart()">Play Again</button><a class="hub" href="/games">← All Games</a></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const GAMEKEY='lander';
async function reward(sc){try{const r=await fetch('/api/arcade3d/reward',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({game:GAMEKEY,score:Math.max(0,Math.round(sc))})});const d=await r.json();if(d.ok)document.getElementById('reward').innerHTML='🪙 +'+d.gold_won+' gold'+(d.gear?'<br>🎁 '+d.gear:'');}catch(e){}}
let scene,camera,renderer,ship,pad,flame,vx,vy,fuel,score,alive,keys={};
function init(){
 scene=new THREE.Scene();camera=new THREE.PerspectiveCamera(55,innerWidth/innerHeight,.1,200);camera.position.set(0,8,30);camera.lookAt(0,8,0);
 renderer=new THREE.WebGLRenderer({antialias:true});renderer.setSize(innerWidth,innerHeight);document.body.appendChild(renderer.domElement);
 scene.add(new THREE.AmbientLight(0x8899bb,.7));const dl=new THREE.DirectionalLight(0xffffff,.6);dl.position.set(4,16,10);scene.add(dl);
 const ground=new THREE.Mesh(new THREE.BoxGeometry(60,2,4),new THREE.MeshStandardMaterial({color:0x2a2f3c}));ground.position.set(0,-1,0);scene.add(ground);
 pad=new THREE.Mesh(new THREE.BoxGeometry(6,.6,4),new THREE.MeshStandardMaterial({color:0x41c97a,emissive:0x063}));scene.add(pad);
 ship=new THREE.Group();const body=new THREE.Mesh(new THREE.ConeGeometry(1,2.2,4),new THREE.MeshStandardMaterial({color:0x5bc0ff,emissive:0x123}));ship.add(body);
 flame=new THREE.Mesh(new THREE.ConeGeometry(.5,1.5,8),new THREE.MeshBasicMaterial({color:0xf4c542}));flame.rotation.x=Math.PI;flame.position.y=-1.6;flame.visible=false;ship.add(flame);scene.add(ship);
 addEventListener('keydown',e=>{keys[e.key.toLowerCase()]=true;if(e.key===' ')e.preventDefault();});addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);
 addEventListener('resize',onResize);restart();
}
function onResize(){camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);}
function restart(){pad.position.set((Math.random()-.5)*36,0,0);ship.position.set((Math.random()-.5)*30,20,0);vx=(Math.random()-.5)*.1;vy=0;fuel=100;score=0;alive=true;document.getElementById('score').textContent=0;document.getElementById('fuel').textContent=100;document.getElementById('msg').style.display='none';document.getElementById('msg').querySelector('h1').textContent='Crashed';}
function nextPad(){score+=100;document.getElementById('score').textContent=score;pad.position.x=(Math.random()-.5)*36;ship.position.set((Math.random()-.5)*30,20,0);vx=(Math.random()-.5)*.12;vy=0;fuel=Math.min(100,fuel+30);document.getElementById('fuel').textContent=Math.floor(fuel);}
function update(){
 const thrusting=(keys[' ']||keys['arrowup']||keys['w'])&&fuel>0;flame.visible=thrusting;
 if(thrusting){vy+=.012;fuel-=.4;document.getElementById('fuel').textContent=Math.max(0,Math.floor(fuel));}
 if((keys['arrowleft']||keys['a'])&&fuel>0){vx-=.006;fuel-=.1;}if((keys['arrowright']||keys['d'])&&fuel>0){vx+=.006;fuel-=.1;}
 vy-=.006;ship.position.x+=vx;ship.position.y+=vy;ship.rotation.z=-vx*3;
 if(ship.position.y<=1.1){
   const onPad=Math.abs(ship.position.x-pad.position.x)<3;const soft=Math.abs(vy)<.16&&Math.abs(vx)<.12;
   if(onPad&&soft)nextPad();else gameOver();
 }
 if(Math.abs(ship.position.x)>34)gameOver();
}
function gameOver(){alive=false;document.getElementById('sub').textContent='Score: '+score;reward(score);document.getElementById('msg').style.display='flex';}
function loop(){requestAnimationFrame(loop);if(alive)update();renderer.render(scene,camera);}
init();loop();
</script></body></html>
