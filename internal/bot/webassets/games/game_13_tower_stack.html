<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tower Stack</title>
<style>
 html,body{margin:0;height:100%;overflow:hidden;background:#0b0e16;font-family:system-ui,sans-serif;color:#e8ecf5}
 #hud{position:fixed;top:12px;left:12px;font-size:18px;z-index:2;text-shadow:0 1px 3px #000}
 #msg{position:fixed;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;background:rgba(8,10,16,.82);z-index:3;text-align:center}
 #msg h1{font-size:42px;margin:0 0 6px;color:#f4c542}#msg button{margin-top:18px;padding:10px 22px;font-size:18px;border:0;border-radius:8px;background:#7b6cff;color:#fff;cursor:pointer}
 .rw{margin-top:10px;color:#f4c542;font-size:20px}.hub{margin-top:14px;color:#8a93a8;font-size:14px;text-decoration:none}
 #hint{position:fixed;bottom:12px;left:12px;font-size:13px;color:#8a93a8;z-index:2}
</style></head>
<body>
<div id="hud">Height: <span id="score">0</span></div>
<div id="hint">Space / click to drop the moving block — align it!</div>
<div id="msg"><h1>Toppled!</h1><div id="sub"></div><div id="reward" class="rw"></div><button onclick="restart()">Play Again</button><a class="hub" href="/games">← All Games</a></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const GAMEKEY='stack';
async function reward(sc){try{const r=await fetch('/api/arcade3d/reward',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({game:GAMEKEY,score:Math.max(0,Math.round(sc))})});const d=await r.json();if(d.ok)document.getElementById('reward').innerHTML='🪙 +'+d.gold_won+' gold'+(d.gear?'<br>🎁 '+d.gear:'');}catch(e){}}
let scene,camera,renderer,stack,cur,dir,curW,baseY,score,alive,hue;
function init(){
 scene=new THREE.Scene();scene.fog=new THREE.Fog(0x0b0e16,30,80);
 camera=new THREE.PerspectiveCamera(55,innerWidth/innerHeight,.1,200);camera.position.set(8,8,18);
 renderer=new THREE.WebGLRenderer({antialias:true});renderer.setSize(innerWidth,innerHeight);document.body.appendChild(renderer.domElement);
 scene.add(new THREE.AmbientLight(0xaabbdd,.8));const dl=new THREE.DirectionalLight(0xffffff,.7);dl.position.set(6,18,10);scene.add(dl);
 const drop=()=>place();addEventListener('keydown',e=>{if(e.key===' '){drop();e.preventDefault();}});addEventListener('mousedown',drop);
 addEventListener('resize',onResize);restart();
}
function onResize(){camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);}
function block(w,y,x,z){const m=new THREE.Mesh(new THREE.BoxGeometry(w,1,4),new THREE.MeshStandardMaterial({color:new THREE.Color().setHSL((hue%360)/360,.6,.55)}));m.position.set(x,y,z||0);hue+=18;scene.add(m);return m;}
function restart(){stack&&stack.forEach(b=>scene.remove(b.m));if(cur)scene.remove(cur);stack=[];score=0;alive=true;hue=200;baseY=0;curW=5;
 const b=block(curW,0,0);stack.push({m:b,w:curW,x:0});spawnMoving();document.getElementById('score').textContent=0;document.getElementById('msg').style.display='none';camera.lookAt(0,2,0);}
function spawnMoving(){const top=stack[stack.length-1];cur=block(top.w,top.m.position.y+1,-7);curW=top.w;dir=1;cur.position.x=-7;}
function place(){if(!alive||!cur)return;const top=stack[stack.length-1];const overlap=curW-Math.abs(cur.position.x-top.x);
 if(overlap<=0)return gameOver();
 const newX=(cur.position.x+top.x)/2;cur.scale.x=overlap/curW;cur.position.x=newX;
 stack.push({m:cur,w:overlap,x:newX});curW=overlap;score++;document.getElementById('score').textContent=score;
 camera.position.y=8+score*1;camera.lookAt(newX,cur.position.y-1,0);
 cur=null;spawnMoving();
}
function gameOver(){alive=false;scene.remove(cur);cur=null;document.getElementById('sub').textContent='Height: '+score;reward(score*15);document.getElementById('msg').style.display='flex';}
function update(){if(cur){cur.position.x+=dir*(.14+score*.004);if(cur.position.x>7){cur.position.x=7;dir=-1;}if(cur.position.x<-7){cur.position.x=-7;dir=1;}}}
function loop(){requestAnimationFrame(loop);if(alive)update();renderer.render(scene,camera);}
init();loop();
</script></body></html>
