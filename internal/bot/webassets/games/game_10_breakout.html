<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Breakout</title>
<style>
 html,body{margin:0;height:100%;overflow:hidden;background:#0b0e16;font-family:system-ui,sans-serif;color:#e8ecf5}
 #hud{position:fixed;top:12px;left:12px;font-size:18px;z-index:2;text-shadow:0 1px 3px #000}
 #msg{position:fixed;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;background:rgba(8,10,16,.82);z-index:3;text-align:center}
 #msg h1{font-size:42px;margin:0 0 6px;color:#f4c542}#msg button{margin-top:18px;padding:10px 22px;font-size:18px;border:0;border-radius:8px;background:#7b6cff;color:#fff;cursor:pointer}
 .rw{margin-top:10px;color:#f4c542;font-size:20px}.hub{margin-top:14px;color:#8a93a8;font-size:14px;text-decoration:none}
 #hint{position:fixed;bottom:12px;left:12px;font-size:13px;color:#8a93a8;z-index:2}
</style></head>
<body>
<div id="hud">Score: <span id="score">0</span> · Lives <span id="lives">3</span></div>
<div id="hint">←/→ or A/D to move the paddle</div>
<div id="msg"><h1>Game Over</h1><div id="sub"></div><div id="reward" class="rw"></div><button onclick="restart()">Play Again</button><a class="hub" href="/games">← All Games</a></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const GAMEKEY='breakout';
async function reward(sc){try{const r=await fetch('/api/arcade3d/reward',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({game:GAMEKEY,score:Math.max(0,Math.round(sc))})});const d=await r.json();if(d.ok)document.getElementById('reward').innerHTML='🪙 +'+d.gold_won+' gold'+(d.gear?'<br>🎁 '+d.gear:'');}catch(e){}}
const W=16,H=20;let scene,camera,renderer,paddle,ball,bricks,bv,score,lives,alive,keys={};
function init(){
 scene=new THREE.Scene();camera=new THREE.PerspectiveCamera(50,innerWidth/innerHeight,.1,200);camera.position.set(0,2,30);camera.lookAt(0,1,0);
 renderer=new THREE.WebGLRenderer({antialias:true});renderer.setSize(innerWidth,innerHeight);document.body.appendChild(renderer.domElement);
 scene.add(new THREE.AmbientLight(0xaabbdd,.8));const dl=new THREE.DirectionalLight(0xffffff,.7);dl.position.set(4,8,12);scene.add(dl);
 const back=new THREE.Mesh(new THREE.BoxGeometry(W+1,H+1,.4),new THREE.MeshStandardMaterial({color:0x10141f}));back.position.z=-.8;scene.add(back);
 paddle=new THREE.Mesh(new THREE.BoxGeometry(3.4,.7,1),new THREE.MeshStandardMaterial({color:0x5bc0ff,emissive:0x123}));paddle.position.y=-H/2+1;scene.add(paddle);
 ball=new THREE.Mesh(new THREE.SphereGeometry(.45,16,16),new THREE.MeshStandardMaterial({color:0xf4c542,emissive:0x442f00}));scene.add(ball);
 addEventListener('keydown',e=>keys[e.key.toLowerCase()]=true);addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);
 addEventListener('resize',onResize);restart();
}
function onResize(){camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);}
function buildBricks(){bricks&&bricks.forEach(b=>scene.remove(b));bricks=[];const cols=8,rows=5,cw=(W-1)/cols;for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){const m=new THREE.Mesh(new THREE.BoxGeometry(cw-.2,.9,1),new THREE.MeshStandardMaterial({color:[0xe2575b,0xff9f40,0xf4c542,0x41c97a,0x5bc0ff][r],emissive:0x111}));m.position.set(-W/2+.5+cw/2+c*cw,H/2-2-r*1.2,0);scene.add(m);bricks.push(m);}}
function serve(){ball.position.set(0,-H/2+2.2,0);bv={x:.18,y:.28};}
function restart(){score=0;lives=3;alive=true;paddle.position.x=0;document.getElementById('score').textContent=0;document.getElementById('lives').textContent=3;document.getElementById('msg').style.display='none';buildBricks();serve();}
function update(){
 if(keys['arrowleft']||keys['a'])paddle.position.x=Math.max(-W/2+1.7,paddle.position.x-.5);
 if(keys['arrowright']||keys['d'])paddle.position.x=Math.min(W/2-1.7,paddle.position.x+.5);
 ball.position.x+=bv.x;ball.position.y+=bv.y;
 if(ball.position.x>W/2-.5||ball.position.x<-W/2+.5)bv.x*=-1;
 if(ball.position.y>H/2-.5)bv.y*=-1;
 if(ball.position.y<paddle.position.y+.8&&ball.position.y>paddle.position.y&&Math.abs(ball.position.x-paddle.position.x)<2&&bv.y<0){bv.y*=-1;bv.x+=(ball.position.x-paddle.position.x)*.06;}
 if(ball.position.y<-H/2){lives--;document.getElementById('lives').textContent=lives;if(lives<=0)return gameOver();serve();}
 for(let i=bricks.length-1;i>=0;i--){const b=bricks[i];if(Math.abs(ball.position.x-b.position.x)<1.2&&Math.abs(ball.position.y-b.position.y)<.9){bv.y*=-1;scene.remove(b);bricks.splice(i,1);score+=15;document.getElementById('score').textContent=score;break;}}
 if(bricks.length===0){score+=200;document.getElementById('score').textContent=score;buildBricks();serve();bv.y*=1.05;}
}
function gameOver(){alive=false;document.getElementById('sub').textContent='Score: '+score;reward(score);document.getElementById('msg').style.display='flex';}
function loop(){requestAnimationFrame(loop);if(alive)update();renderer.render(scene,camera);}
init();loop();
</script></body></html>
