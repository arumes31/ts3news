<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Platform Jumper</title>
<style>
 html,body{margin:0;height:100%;overflow:hidden;background:#0b0e16;font-family:system-ui,sans-serif;color:#e8ecf5}
 #hud{position:fixed;top:12px;left:12px;font-size:18px;z-index:2;text-shadow:0 1px 3px #000}
 #msg{position:fixed;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;background:rgba(8,10,16,.82);z-index:3;text-align:center}
 #msg h1{font-size:42px;margin:0 0 6px;color:#f4c542}#msg button{margin-top:18px;padding:10px 22px;font-size:18px;border:0;border-radius:8px;background:#7b6cff;color:#fff;cursor:pointer}
 .rw{margin-top:10px;color:#f4c542;font-size:20px}.hub{margin-top:14px;color:#8a93a8;font-size:14px;text-decoration:none}
 #hint{position:fixed;bottom:12px;left:12px;font-size:13px;color:#8a93a8;z-index:2}
</style></head>
<body>
<div id="hud">Height: <span id="score">0</span></div>
<div id="hint">←/→ or A/D to steer · bounce ever higher</div>
<div id="msg"><h1>Fell!</h1><div id="sub"></div><div id="reward" class="rw"></div><button onclick="restart()">Play Again</button><a class="hub" href="/games">← All Games</a></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const GAMEKEY='jumper';
async function reward(sc){try{const r=await fetch('/api/arcade3d/reward',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({game:GAMEKEY,score:Math.max(0,Math.round(sc))})});const d=await r.json();if(d.ok)document.getElementById('reward').innerHTML='🪙 +'+d.gold_won+' gold'+(d.gear?'<br>🎁 '+d.gear:'');}catch(e){}}
const W=8;let scene,camera,renderer,player,plats,vy,maxH,score,alive,keys={};
function init(){
 scene=new THREE.Scene();scene.fog=new THREE.Fog(0x0b0e16,30,70);
 camera=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,.1,200);camera.position.set(0,0,20);
 renderer=new THREE.WebGLRenderer({antialias:true});renderer.setSize(innerWidth,innerHeight);document.body.appendChild(renderer.domElement);
 scene.add(new THREE.AmbientLight(0xaabbdd,.85));const dl=new THREE.DirectionalLight(0xffffff,.7);dl.position.set(3,8,12);scene.add(dl);
 player=new THREE.Mesh(new THREE.SphereGeometry(.7,18,18),new THREE.MeshStandardMaterial({color:0x5bc0ff,emissive:0x123}));scene.add(player);
 addEventListener('keydown',e=>keys[e.key.toLowerCase()]=true);addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);
 addEventListener('resize',onResize);restart();
}
function onResize(){camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);}
function mkPlat(y){const m=new THREE.Mesh(new THREE.BoxGeometry(3,.6,2),new THREE.MeshStandardMaterial({color:0x41c97a,emissive:0x062}));m.position.set((Math.random()-.5)*W*2,y,0);scene.add(m);plats.push(m);}
function restart(){plats&&plats.forEach(p=>scene.remove(p));plats=[];vy=.5;maxH=0;score=0;alive=true;player.position.set(0,0,0);for(let i=0;i<12;i++)mkPlat(-2+i*3.2);keys={};document.getElementById('score').textContent=0;document.getElementById('msg').style.display='none';}
function update(){
 if(keys['arrowleft']||keys['a'])player.position.x-=.32;if(keys['arrowright']||keys['d'])player.position.x+=.32;
 if(player.position.x>W+1)player.position.x=-W-1;if(player.position.x<-W-1)player.position.x=W+1;
 vy-=.018;player.position.y+=vy;
 if(vy<0)plats.forEach(p=>{if(Math.abs(player.position.x-p.position.x)<2&&Math.abs(player.position.y-(p.position.y+.7))<.5&&player.position.y>p.position.y){vy=.52;}});
 if(player.position.y>maxH){maxH=player.position.y;score=Math.floor(maxH);document.getElementById('score').textContent=score;}
 camera.position.y+=((player.position.y)-camera.position.y)*.08;
 // recycle platforms below view
 plats.forEach(p=>{if(p.position.y<camera.position.y-14){p.position.y+=plats.length*3.2;p.position.x=(Math.random()-.5)*W*2;}});
 if(player.position.y<camera.position.y-13)gameOver();
}
function gameOver(){alive=false;document.getElementById('sub').textContent='Height: '+score;reward(score*4);document.getElementById('msg').style.display='flex';}
function loop(){requestAnimationFrame(loop);if(alive)update();renderer.render(scene,camera);}
init();loop();
</script></body></html>
