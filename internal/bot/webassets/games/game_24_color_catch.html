<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Colour Catch</title>
<style>
 html,body{margin:0;height:100%;overflow:hidden;background:#0b0e16;font-family:system-ui,sans-serif;color:#e8ecf5}
 #hud{position:fixed;top:12px;left:12px;font-size:18px;z-index:2;text-shadow:0 1px 3px #000}
 #msg{position:fixed;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;background:rgba(8,10,16,.82);z-index:3;text-align:center}
 #msg h1{font-size:42px;margin:0 0 6px;color:#f4c542}#msg button{margin-top:18px;padding:10px 22px;font-size:18px;border:0;border-radius:8px;background:#7b6cff;color:#fff;cursor:pointer}
 .rw{margin-top:10px;color:#f4c542;font-size:20px}.hub{margin-top:14px;color:#8a93a8;font-size:14px;text-decoration:none}
 #hint{position:fixed;bottom:12px;left:12px;font-size:13px;color:#8a93a8;z-index:2}
</style></head>
<body>
<div id="hud">Score: <span id="score">0</span> · Lives <span id="lives">3</span></div>
<div id="hint">←/→ move · Space to change your colour — catch matching blocks only</div>
<div id="msg"><h1>Game Over</h1><div id="sub"></div><div id="reward" class="rw"></div><button onclick="restart()">Play Again</button><a class="hub" href="/games">← All Games</a></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const GAMEKEY='color';
async function reward(sc){try{const r=await fetch('/api/arcade3d/reward',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({game:GAMEKEY,score:Math.max(0,Math.round(sc))})});const d=await r.json();if(d.ok)document.getElementById('reward').innerHTML='🪙 +'+d.gold_won+' gold'+(d.gear?'<br>🎁 '+d.gear:'');}catch(e){}}
const COLORS=[0xe2575b,0x41c97a,0x5bc0ff,0xf4c542];const W=14;let scene,camera,renderer,paddle,blocks,ci,score,lives,alive,t,keys={};
function init(){
 scene=new THREE.Scene();camera=new THREE.PerspectiveCamera(55,innerWidth/innerHeight,.1,200);camera.position.set(0,6,24);camera.lookAt(0,4,0);
 renderer=new THREE.WebGLRenderer({antialias:true});renderer.setSize(innerWidth,innerHeight);document.body.appendChild(renderer.domElement);
 scene.add(new THREE.AmbientLight(0xaabbdd,.85));const dl=new THREE.DirectionalLight(0xffffff,.7);dl.position.set(4,12,10);scene.add(dl);
 paddle=new THREE.Mesh(new THREE.BoxGeometry(3.4,.8,2),new THREE.MeshStandardMaterial({color:COLORS[0],emissive:0x111}));paddle.position.y=-6;scene.add(paddle);
 addEventListener('keydown',e=>{keys[e.key.toLowerCase()]=true;if(e.key===' '){ci=(ci+1)%COLORS.length;paddle.material.color.setHex(COLORS[ci]);e.preventDefault();}});addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);
 addEventListener('resize',onResize);restart();
}
function onResize(){camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);}
function restart(){blocks&&blocks.forEach(b=>scene.remove(b.m));blocks=[];ci=0;paddle.material.color.setHex(COLORS[0]);score=0;lives=3;alive=true;t=0;paddle.position.x=0;document.getElementById('score').textContent=0;document.getElementById('lives').textContent=3;document.getElementById('msg').style.display='none';}
function spawn(){const c=Math.floor(Math.random()*COLORS.length);const m=new THREE.Mesh(new THREE.BoxGeometry(1.6,1.6,1.6),new THREE.MeshStandardMaterial({color:COLORS[c],emissive:0x111}));m.position.set((Math.random()-.5)*W*2,12,0);scene.add(m);blocks.push({m,c});}
function update(){
 t++;if(t%Math.max(22,46-Math.floor(score/30))===0)spawn();
 if(keys['arrowleft']||keys['a'])paddle.position.x=Math.max(-W,paddle.position.x-.5);if(keys['arrowright']||keys['d'])paddle.position.x=Math.min(W,paddle.position.x+.5);
 for(let i=blocks.length-1;i>=0;i--){const b=blocks[i];b.m.position.y-=.18+score*.0006;b.m.rotation.x+=.04;
  if(b.m.position.y<-5.2&&b.m.position.y>-6.8&&Math.abs(b.m.position.x-paddle.position.x)<2.2){if(b.c===ci){score+=10;}else{lives--;document.getElementById('lives').textContent=lives;}scene.remove(b.m);blocks.splice(i,1);document.getElementById('score').textContent=score;if(lives<=0)return gameOver();continue;}
  if(b.m.position.y<-9){scene.remove(b.m);blocks.splice(i,1);}}
}
function gameOver(){alive=false;document.getElementById('sub').textContent='Score: '+score;reward(score);document.getElementById('msg').style.display='flex';}
function loop(){requestAnimationFrame(loop);if(alive)update();renderer.render(scene,camera);}
init();loop();
</script></body></html>
