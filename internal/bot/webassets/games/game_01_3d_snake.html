<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>3D Snake</title>
<style>
 html,body{margin:0;height:100%;overflow:hidden;background:#0b0e16;font-family:system-ui,sans-serif;color:#e8ecf5}
 #hud{position:fixed;top:12px;left:12px;font-size:18px;z-index:2;text-shadow:0 1px 3px #000}
 #msg{position:fixed;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;background:rgba(8,10,16,.8);z-index:3;text-align:center}
 #msg h1{font-size:42px;margin:0 0 6px;color:#f4c542}#msg button{margin-top:18px;padding:10px 22px;font-size:18px;border:0;border-radius:8px;background:#7b6cff;color:#fff;cursor:pointer}
 #hint{position:fixed;bottom:12px;left:12px;font-size:13px;color:#8a93a8;z-index:2}
</style></head>
<body>
<div id="hud">Score: <span id="score">0</span></div>
<div id="hint">Arrow keys / WASD to steer</div>
<div id="msg"><h1>Game Over</h1><div id="sub"></div><div id="reward" style="margin-top:10px;color:#f4c542;font-size:20px"></div><button onclick="restart()">Play Again</button><a href="/games" style="margin-top:14px;color:#8a93a8;font-size:14px">← All Games</a></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
async function reward(sc){try{const r=await fetch('/api/arcade3d/reward',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({game:'snake',score:Math.max(0,Math.round(sc))})});const d=await r.json();if(d.ok)document.getElementById('reward').innerHTML='🪙 +'+d.gold_won+' gold'+(d.gear?'<br>🎁 '+d.gear:'');}catch(e){}}
const N=16; let scene,camera,renderer,segGroup,food,snake,dir,nextDir,score,tickMs,acc,last,alive;
function init(){
 scene=new THREE.Scene();scene.fog=new THREE.Fog(0x0b0e16,20,60);
 camera=new THREE.PerspectiveCamera(55,innerWidth/innerHeight,.1,200);
 camera.position.set(0,20,18);camera.lookAt(0,0,0);
 renderer=new THREE.WebGLRenderer({antialias:true});renderer.setSize(innerWidth,innerHeight);document.body.appendChild(renderer.domElement);
 scene.add(new THREE.AmbientLight(0x8899bb,.7));const dl=new THREE.DirectionalLight(0xffffff,.8);dl.position.set(8,20,10);scene.add(dl);
 const floor=new THREE.Mesh(new THREE.BoxGeometry(N,.5,N),new THREE.MeshStandardMaterial({color:0x161b29}));floor.position.y=-.25;scene.add(floor);
 const grid=new THREE.GridHelper(N,N,0x2e3650,0x1c2333);grid.position.y=.01;scene.add(grid);
 segGroup=new THREE.Group();scene.add(segGroup);
 food=new THREE.Mesh(new THREE.SphereGeometry(.45,16,16),new THREE.MeshStandardMaterial({color:0xe2575b,emissive:0x611}));scene.add(food);
 addEventListener('keydown',key);addEventListener('resize',onResize);restart();
}
function onResize(){camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);}
function gx(i){return i-N/2+.5;}
function placeFood(){let ok;do{food.userData={x:Math.floor(Math.random()*N),z:Math.floor(Math.random()*N)};ok=!snake.some(s=>s.x===food.userData.x&&s.z===food.userData.z);}while(!ok);food.position.set(gx(food.userData.x),.5,gx(food.userData.z));}
function restart(){snake=[{x:8,z:8},{x:7,z:8},{x:6,z:8}];dir={x:1,z:0};nextDir=dir;score=0;tickMs=150;acc=0;alive=true;last=performance.now();document.getElementById('score').textContent=0;document.getElementById('msg').style.display='none';placeFood();draw();}
function key(e){const k=e.key.toLowerCase();if((k==='arrowup'||k==='w')&&dir.z!==1)nextDir={x:0,z:-1};else if((k==='arrowdown'||k==='s')&&dir.z!==-1)nextDir={x:0,z:1};else if((k==='arrowleft'||k==='a')&&dir.x!==1)nextDir={x:-1,z:0};else if((k==='arrowright'||k==='d')&&dir.x!==-1)nextDir={x:1,z:0};}
function step(){dir=nextDir;const h={x:snake[0].x+dir.x,z:snake[0].z+dir.z};
 if(h.x<0||h.x>=N||h.z<0||h.z>=N||snake.some(s=>s.x===h.x&&s.z===h.z))return gameOver();
 snake.unshift(h);
 if(h.x===food.userData.x&&h.z===food.userData.z){score+=10;document.getElementById('score').textContent=score;tickMs=Math.max(70,tickMs-4);placeFood();}else snake.pop();
 draw();}
function draw(){while(segGroup.children.length)segGroup.remove(segGroup.children[0]);
 snake.forEach((s,i)=>{const m=new THREE.Mesh(new THREE.BoxGeometry(.85,.85,.85),new THREE.MeshStandardMaterial({color:i===0?0x41c97a:0x2a8a4a,emissive:i===0?0x0a3:0x000}));m.position.set(gx(s.x),.5,gx(s.z));segGroup.add(m);});}
function gameOver(){alive=false;document.getElementById('sub').textContent='Score: '+score;reward(score);document.getElementById('msg').style.display='flex';}
function loop(t){requestAnimationFrame(loop);food.rotation.y+=.05;if(alive){acc+=t-last;last=t;if(acc>=tickMs){acc=0;step();}}else last=t;renderer.render(scene,camera);}
init();requestAnimationFrame(loop);
</script></body></html>
