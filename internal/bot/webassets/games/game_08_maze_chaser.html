<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Maze Chaser</title>
<style>
 html,body{margin:0;height:100%;overflow:hidden;background:#05070d;font-family:system-ui,sans-serif;color:#e8ecf5}
 #hud{position:fixed;top:12px;left:12px;font-size:18px;z-index:2;text-shadow:0 1px 3px #000}
 #msg{position:fixed;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;background:rgba(8,10,16,.82);z-index:3;text-align:center}
 #msg h1{font-size:42px;margin:0 0 6px;color:#f4c542}#msg button{margin-top:18px;padding:10px 22px;font-size:18px;border:0;border-radius:8px;background:#7b6cff;color:#fff;cursor:pointer}
 .rw{margin-top:10px;color:#f4c542;font-size:20px}.hub{margin-top:14px;color:#8a93a8;font-size:14px;text-decoration:none}
 #hint{position:fixed;bottom:12px;left:12px;font-size:13px;color:#8a93a8;z-index:2}
</style></head>
<body>
<div id="hud">Score: <span id="score">0</span> · Pellets <span id="left">0</span></div>
<div id="hint">Arrow keys / WASD · grab every pellet, dodge the ghost</div>
<div id="msg"><h1>Caught!</h1><div id="sub"></div><div id="reward" class="rw"></div><button onclick="restart()">Play Again</button><a class="hub" href="/games">← All Games</a></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const GAMEKEY='pacman';
async function reward(sc){try{const r=await fetch('/api/arcade3d/reward',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({game:GAMEKEY,score:Math.max(0,Math.round(sc))})});const d=await r.json();if(d.ok)document.getElementById('reward').innerHTML='🪙 +'+d.gold_won+' gold'+(d.gear?'<br>🎁 '+d.gear:'');}catch(e){}}
const MAP=["###############","#......#......#","#.###.#.###.#.#","#.............#","#.###.###.###.#","#.....#.#.....#","###.#.#.#.#.###","#...#.....#...#","#.#.#.###.#.#.#","#.............#","#.###.#.#.###.#","#.....#.#.....#","###############"];
const R=MAP.length,C=MAP[0].length;let scene,camera,renderer,player,ghost,pellets,score,left,alive,pdir,ndir,ghostMesh,acc,last;
function init(){
 scene=new THREE.Scene();camera=new THREE.PerspectiveCamera(55,innerWidth/innerHeight,.1,200);camera.position.set(0,22,12);camera.lookAt(0,0,-1);
 renderer=new THREE.WebGLRenderer({antialias:true});renderer.setSize(innerWidth,innerHeight);document.body.appendChild(renderer.domElement);
 scene.add(new THREE.AmbientLight(0x8899bb,.7));const dl=new THREE.DirectionalLight(0xffffff,.8);dl.position.set(6,20,8);scene.add(dl);
 pellets=[];const wallMat=new THREE.MeshStandardMaterial({color:0x2444aa,emissive:0x07123a});
 for(let r=0;r<R;r++)for(let c=0;c<C;c++){if(MAP[r][c]==='#'){const w=new THREE.Mesh(new THREE.BoxGeometry(1,1.2,1),wallMat);w.position.set(gx(c),.6,gz(r));scene.add(w);}else{const p=new THREE.Mesh(new THREE.SphereGeometry(.16,8,8),new THREE.MeshStandardMaterial({color:0xf4c542,emissive:0x442f00}));p.position.set(gx(c),.5,gz(r));p.userData={r,c};scene.add(p);pellets.push(p);}}
 player=new THREE.Mesh(new THREE.SphereGeometry(.42,18,18),new THREE.MeshStandardMaterial({color:0xffd23f,emissive:0x553}));scene.add(player);
 ghostMesh=new THREE.Mesh(new THREE.SphereGeometry(.45,18,18),new THREE.MeshStandardMaterial({color:0xe2575b,emissive:0x300}));scene.add(ghostMesh);
 addEventListener('keydown',key);addEventListener('resize',onResize);restart();
}
function onResize(){camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);}
function gx(c){return c-C/2+.5;}function gz(r){return r-R/2+.5;}
function open(r,c){return MAP[r]&&MAP[r][c]&&MAP[r][c]!=='#';}
function restart(){pellets.forEach(p=>{p.visible=true;});score=0;left=pellets.length;alive=true;pdir={r:0,c:0};ndir={r:0,c:0};player.userData={r:6,c:7};ghost={r:1,c:1};acc=0;last=performance.now();sync();document.getElementById('score').textContent=0;document.getElementById('left').textContent=left;document.getElementById('msg').style.display='none';}
function sync(){player.position.set(gx(player.userData.c),.5,gz(player.userData.r));ghostMesh.position.set(gx(ghost.c),.55,gz(ghost.r));}
function key(e){if(!alive)return;const k=e.key.toLowerCase();if(k==='arrowup'||k==='w')ndir={r:-1,c:0};else if(k==='arrowdown'||k==='s')ndir={r:1,c:0};else if(k==='arrowleft'||k==='a')ndir={r:0,c:-1};else if(k==='arrowright'||k==='d')ndir={r:0,c:1};}
function step(){
 let pr=player.userData.r,pc=player.userData.c;
 if(open(pr+ndir.r,pc+ndir.c))pdir=ndir;
 if(open(pr+pdir.r,pc+pdir.c)){player.userData.r+=pdir.r;player.userData.c+=pdir.c;}
 pellets.forEach(p=>{if(p.visible&&p.userData.r===player.userData.r&&p.userData.c===player.userData.c){p.visible=false;score+=10;left--;document.getElementById('score').textContent=score;document.getElementById('left').textContent=left;if(left<=0)win();}});
 // greedy ghost
 const opts=[{r:-1,c:0},{r:1,c:0},{r:0,c:-1},{r:0,c:1}].filter(o=>open(ghost.r+o.r,ghost.c+o.c));
 opts.sort((a,b)=>(Math.abs(ghost.r+a.r-player.userData.r)+Math.abs(ghost.c+a.c-player.userData.c))-(Math.abs(ghost.r+b.r-player.userData.r)+Math.abs(ghost.c+b.c-player.userData.c)));
 if(opts.length){const o=Math.random()<.8?opts[0]:opts[Math.floor(Math.random()*opts.length)];ghost.r+=o.r;ghost.c+=o.c;}
 sync();
 if(ghost.r===player.userData.r&&ghost.c===player.userData.c)gameOver();
}
function win(){alive=false;document.getElementById('msg').querySelector('h1').textContent='Maze Cleared!';document.getElementById('sub').textContent='Score: '+score;reward(score+200);document.getElementById('msg').style.display='flex';}
function gameOver(){alive=false;document.getElementById('msg').querySelector('h1').textContent='Caught!';document.getElementById('sub').textContent='Score: '+score;reward(score);document.getElementById('msg').style.display='flex';}
function loop(t){requestAnimationFrame(loop);if(alive){acc+=t-last;last=t;if(acc>=170){acc=0;step();}}else last=t;player.rotation.y+=.1;renderer.render(scene,camera);}
init();requestAnimationFrame(loop);
</script></body></html>
