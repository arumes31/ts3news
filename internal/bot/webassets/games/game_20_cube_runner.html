<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cube Runner</title>
<style>
 html,body{margin:0;height:100%;overflow:hidden;background:#0b0e16;font-family:system-ui,sans-serif;color:#e8ecf5}
 #hud{position:fixed;top:12px;left:12px;font-size:18px;z-index:2;text-shadow:0 1px 3px #000}
 #msg{position:fixed;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;background:rgba(8,10,16,.82);z-index:3;text-align:center}
 #msg h1{font-size:42px;margin:0 0 6px;color:#f4c542}#msg button{margin-top:18px;padding:10px 22px;font-size:18px;border:0;border-radius:8px;background:#7b6cff;color:#fff;cursor:pointer}
 .rw{margin-top:10px;color:#f4c542;font-size:20px}.hub{margin-top:14px;color:#8a93a8;font-size:14px;text-decoration:none}
 #hint{position:fixed;bottom:12px;left:12px;font-size:13px;color:#8a93a8;z-index:2}
</style></head>
<body>
<div id="hud">Distance: <span id="score">0</span></div>
<div id="hint">←/→ or A/D to weave through the field</div>
<div id="msg"><h1>Crashed!</h1><div id="sub"></div><div id="reward" class="rw"></div><button onclick="restart()">Play Again</button><a class="hub" href="/games">← All Games</a></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const GAMEKEY='cuberun';
async function reward(sc){try{const r=await fetch('/api/arcade3d/reward',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({game:GAMEKEY,score:Math.max(0,Math.round(sc))})});const d=await r.json();if(d.ok)document.getElementById('reward').innerHTML='🪙 +'+d.gold_won+' gold'+(d.gear?'<br>🎁 '+d.gear:'');}catch(e){}}
const LIM=10;let scene,camera,renderer,player,obs,speed,dist,alive,keys={},t,vx;
function init(){
 scene=new THREE.Scene();scene.fog=new THREE.Fog(0x0b0e16,30,75);
 camera=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,.1,200);camera.position.set(0,3.5,8);
 renderer=new THREE.WebGLRenderer({antialias:true});renderer.setSize(innerWidth,innerHeight);document.body.appendChild(renderer.domElement);
 scene.add(new THREE.AmbientLight(0xaabbdd,.8));const dl=new THREE.DirectionalLight(0xffffff,.7);dl.position.set(4,12,8);scene.add(dl);
 const floor=new THREE.Mesh(new THREE.BoxGeometry(LIM*2+4,.4,400),new THREE.MeshStandardMaterial({color:0x141b2a}));floor.position.set(0,-.5,-180);scene.add(floor);
 const grid=new THREE.GridHelper(400,160,0x2e3650,0x18203a);grid.position.set(0,-.28,-180);grid.rotation.y=0;scene.add(grid);
 player=new THREE.Mesh(new THREE.TetrahedronGeometry(1),new THREE.MeshStandardMaterial({color:0x5bc0ff,emissive:0x123,flatShading:true}));player.position.set(0,.5,4);scene.add(player);
 addEventListener('keydown',e=>keys[e.key.toLowerCase()]=true);addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);
 addEventListener('resize',onResize);restart();
}
function onResize(){camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);}
function restart(){obs&&obs.forEach(o=>scene.remove(o));obs=[];speed=.5;dist=0;alive=true;t=0;vx=0;player.position.x=0;document.getElementById('score').textContent=0;document.getElementById('msg').style.display='none';}
function spawn(){const o=new THREE.Mesh(new THREE.BoxGeometry(1.8,1.8,1.8),new THREE.MeshStandardMaterial({color:0xe2575b,emissive:0x300}));o.position.set((Math.random()-.5)*LIM*2,.9,-90);scene.add(o);obs.push(o);}
function update(){
 t++;if(t%Math.max(6,16-Math.floor(dist/200))===0)spawn();
 if(keys['arrowleft']||keys['a'])vx-=.06;if(keys['arrowright']||keys['d'])vx+=.06;vx*=.86;player.position.x=Math.max(-LIM,Math.min(LIM,player.position.x+vx));
 player.rotation.z=-vx*.8;player.rotation.x+=.03;
 for(let i=obs.length-1;i>=0;i--){const o=obs[i];o.position.z+=speed;o.rotation.y+=.03;
  if(Math.abs(o.position.z-player.position.z)<1.5&&Math.abs(o.position.x-player.position.x)<1.6)return gameOver();
  if(o.position.z>10){scene.remove(o);obs.splice(i,1);}}
 dist+=speed;document.getElementById('score').textContent=Math.floor(dist);speed=.5+dist*.0008;
 camera.position.x+=(player.position.x*.5-camera.position.x)*.1;
}
function gameOver(){alive=false;document.getElementById('sub').textContent='Distance: '+Math.floor(dist);reward(Math.floor(dist));document.getElementById('msg').style.display='flex';}
function loop(){requestAnimationFrame(loop);if(alive)update();renderer.render(scene,camera);}
init();loop();
</script></body></html>
