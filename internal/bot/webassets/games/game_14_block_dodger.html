<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Block Dodger</title>
<style>
 html,body{margin:0;height:100%;overflow:hidden;background:#0b0e16;font-family:system-ui,sans-serif;color:#e8ecf5}
 #hud{position:fixed;top:12px;left:12px;font-size:18px;z-index:2;text-shadow:0 1px 3px #000}
 #msg{position:fixed;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;background:rgba(8,10,16,.82);z-index:3;text-align:center}
 #msg h1{font-size:42px;margin:0 0 6px;color:#f4c542}#msg button{margin-top:18px;padding:10px 22px;font-size:18px;border:0;border-radius:8px;background:#7b6cff;color:#fff;cursor:pointer}
 .rw{margin-top:10px;color:#f4c542;font-size:20px}.hub{margin-top:14px;color:#8a93a8;font-size:14px;text-decoration:none}
 #hint{position:fixed;bottom:12px;left:12px;font-size:13px;color:#8a93a8;z-index:2}
</style></head>
<body>
<div id="hud">Score: <span id="score">0</span></div>
<div id="hint">←/→ or A/D to dodge the falling blocks</div>
<div id="msg"><h1>Squashed!</h1><div id="sub"></div><div id="reward" class="rw"></div><button onclick="restart()">Play Again</button><a class="hub" href="/games">← All Games</a></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const GAMEKEY='dodge';
async function reward(sc){try{const r=await fetch('/api/arcade3d/reward',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({game:GAMEKEY,score:Math.max(0,Math.round(sc))})});const d=await r.json();if(d.ok)document.getElementById('reward').innerHTML='🪙 +'+d.gold_won+' gold'+(d.gear?'<br>🎁 '+d.gear:'');}catch(e){}}
const B=12;let scene,camera,renderer,player,blocks,score,alive,t,keys={};
function init(){
 scene=new THREE.Scene();scene.fog=new THREE.Fog(0x0b0e16,30,70);
 camera=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,.1,200);camera.position.set(0,10,20);camera.lookAt(0,2,-4);
 renderer=new THREE.WebGLRenderer({antialias:true});renderer.setSize(innerWidth,innerHeight);document.body.appendChild(renderer.domElement);
 scene.add(new THREE.AmbientLight(0xaabbdd,.8));const dl=new THREE.DirectionalLight(0xffffff,.7);dl.position.set(4,16,8);scene.add(dl);
 const floor=new THREE.Mesh(new THREE.BoxGeometry(B*2+2,.5,40),new THREE.MeshStandardMaterial({color:0x1a2030}));floor.position.set(0,-.25,-8);scene.add(floor);
 player=new THREE.Mesh(new THREE.BoxGeometry(1.6,1.6,1.6),new THREE.MeshStandardMaterial({color:0x5bc0ff,emissive:0x123}));player.position.set(0,.8,8);scene.add(player);
 addEventListener('keydown',e=>keys[e.key.toLowerCase()]=true);addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);
 addEventListener('resize',onResize);restart();
}
function onResize(){camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);}
function restart(){blocks&&blocks.forEach(b=>scene.remove(b));blocks=[];score=0;alive=true;t=0;player.position.x=0;document.getElementById('score').textContent=0;document.getElementById('msg').style.display='none';}
function spawn(){const b=new THREE.Mesh(new THREE.BoxGeometry(1.8,1.8,1.8),new THREE.MeshStandardMaterial({color:0xe2575b,emissive:0x300}));b.position.set((Math.random()-.5)*B*2,.9,-26);b.userData={v:.18+score*.0007+Math.random()*.1};scene.add(b);blocks.push(b);}
function update(){
 t++;if(t%Math.max(7,20-Math.floor(score/40))===0)spawn();
 if(keys['arrowleft']||keys['a'])player.position.x=Math.max(-B,player.position.x-.42);if(keys['arrowright']||keys['d'])player.position.x=Math.min(B,player.position.x+.42);
 for(let i=blocks.length-1;i>=0;i--){const b=blocks[i];b.position.z+=b.userData.v;b.rotation.x+=.05;
  if(Math.abs(b.position.z-player.position.z)<1.6&&Math.abs(b.position.x-player.position.x)<1.7)return gameOver();
  if(b.position.z>12){scene.remove(b);blocks.splice(i,1);score+=5;document.getElementById('score').textContent=score;}}
}
function gameOver(){alive=false;document.getElementById('sub').textContent='Score: '+score;reward(score);document.getElementById('msg').style.display='flex';}
function loop(){requestAnimationFrame(loop);if(alive)update();renderer.render(scene,camera);}
init();loop();
</script></body></html>
