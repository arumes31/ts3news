<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Light Cycles</title>
<style>
 html,body{margin:0;height:100%;overflow:hidden;background:#05070f;font-family:system-ui,sans-serif;color:#e8ecf5}
 #hud{position:fixed;top:12px;left:12px;font-size:18px;z-index:2;text-shadow:0 1px 3px #000}
 #msg{position:fixed;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;background:rgba(8,10,16,.82);z-index:3;text-align:center}
 #msg h1{font-size:42px;margin:0 0 6px;color:#f4c542}#msg button{margin-top:18px;padding:10px 22px;font-size:18px;border:0;border-radius:8px;background:#7b6cff;color:#fff;cursor:pointer}
 .rw{margin-top:10px;color:#f4c542;font-size:20px}.hub{margin-top:14px;color:#8a93a8;font-size:14px;text-decoration:none}
 #hint{position:fixed;bottom:12px;left:12px;font-size:13px;color:#8a93a8;z-index:2}
</style></head>
<body>
<div id="hud">Score: <span id="score">0</span></div>
<div id="hint">←/→ or A/D to turn · don't hit walls or trails</div>
<div id="msg"><h1>Derezzed</h1><div id="sub"></div><div id="reward" class="rw"></div><button onclick="restart()">Play Again</button><a class="hub" href="/games">← All Games</a></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const GAMEKEY='tron';
async function reward(sc){try{const r=await fetch('/api/arcade3d/reward',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({game:GAMEKEY,score:Math.max(0,Math.round(sc))})});const d=await r.json();if(d.ok)document.getElementById('reward').innerHTML='🪙 +'+d.gold_won+' gold'+(d.gear?'<br>🎁 '+d.gear:'');}catch(e){}}
const G=40;let scene,camera,renderer,grid,you,cpu,trailG,score,alive,acc,last;
const DIRS=[{x:1,z:0},{x:0,z:1},{x:-1,z:0},{x:0,z:-1}];
function init(){
 scene=new THREE.Scene();camera=new THREE.PerspectiveCamera(55,innerWidth/innerHeight,.1,300);camera.position.set(0,46,30);camera.lookAt(0,0,0);
 renderer=new THREE.WebGLRenderer({antialias:true});renderer.setSize(innerWidth,innerHeight);document.body.appendChild(renderer.domElement);
 scene.add(new THREE.AmbientLight(0x99aacc,.8));const dl=new THREE.DirectionalLight(0xffffff,.5);dl.position.set(8,24,10);scene.add(dl);
 const floor=new THREE.Mesh(new THREE.BoxGeometry(G,.4,G),new THREE.MeshStandardMaterial({color:0x0c1424}));floor.position.y=-.2;scene.add(floor);
 scene.add(new THREE.GridHelper(G,G,0x163a5a,0x102036));
 you=new THREE.Mesh(new THREE.BoxGeometry(.8,.8,.8),new THREE.MeshStandardMaterial({color:0x5bc0ff,emissive:0x1a4b7a}));scene.add(you);
 cpu=new THREE.Mesh(new THREE.BoxGeometry(.8,.8,.8),new THREE.MeshStandardMaterial({color:0xe2575b,emissive:0x4a1414}));scene.add(cpu);
 trailG=new THREE.Group();scene.add(trailG);
 addEventListener('keydown',key);addEventListener('resize',onResize);restart();
}
function onResize(){camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);}
function gx(i){return i-G/2+.5;}
let occ,pp,cp,pd,cd;
function restart(){while(trailG.children.length)trailG.remove(trailG.children[0]);occ=new Set();pp={x:14,z:20};cp={x:26,z:20};pd=2;cd=0;score=0;alive=true;acc=0;last=performance.now();place();document.getElementById('score').textContent=0;document.getElementById('msg').style.display='none';}
function place(){you.position.set(gx(pp.x),.4,gx(pp.z));cpu.position.set(gx(cp.x),.4,gx(cp.z));}
function key(e){if(!alive)return;const k=e.key.toLowerCase();if(k==='arrowleft'||k==='a')pd=(pd+1)%4;else if(k==='arrowright'||k==='d')pd=(pd+3)%4;}
function trail(p,col){const m=new THREE.Mesh(new THREE.BoxGeometry(.9,.6,.9),new THREE.MeshStandardMaterial({color:col,emissive:col&0x222222}));m.position.set(gx(p.x),.3,gx(p.z));trailG.add(m);occ.add(p.x+','+p.z);}
function blocked(x,z){return x<0||x>=G||z<0||z>=G||occ.has(x+','+z);}
function step(){
 trail({x:pp.x,z:pp.z},0x2a7fc0);trail({x:cp.x,z:cp.z},0xc04040);
 // cpu AI: keep direction unless blocked, then turn to a free side
 const cn={x:cp.x+DIRS[cd].x,z:cp.z+DIRS[cd].z};
 if(blocked(cn.x,cn.z)||Math.random()<.08){const opts=[ (cd+1)%4,(cd+3)%4,cd].filter(d=>!blocked(cp.x+DIRS[d].x,cp.z+DIRS[d].z));if(opts.length)cd=opts[Math.floor(Math.random()*opts.length)];}
 const np={x:pp.x+DIRS[pd].x,z:pp.z+DIRS[pd].z};const ncp={x:cp.x+DIRS[cd].x,z:cp.z+DIRS[cd].z};
 const pDead=blocked(np.x,np.z),cDead=blocked(ncp.x,ncp.z)||(np.x===ncp.x&&np.z===ncp.z);
 if(pDead)return gameOver();
 pp=np;cp=ncp;place();
 if(cDead){score+=100;document.getElementById('score').textContent=score;respawnCPU();}
 score+=1;document.getElementById('score').textContent=score;
}
function respawnCPU(){let x,z;do{x=Math.floor(Math.random()*G);z=Math.floor(Math.random()*G);}while(blocked(x,z));cp={x,z};cd=Math.floor(Math.random()*4);}
function gameOver(){alive=false;document.getElementById('sub').textContent='Score: '+score;reward(score);document.getElementById('msg').style.display='flex';}
function loop(t){requestAnimationFrame(loop);if(alive){acc+=t-last;last=t;if(acc>=90){acc=0;step();}}else last=t;renderer.render(scene,camera);}
init();requestAnimationFrame(loop);
</script></body></html>
