<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Meteor Dodger</title>
<style>
 html,body{margin:0;height:100%;overflow:hidden;background:#0b0e16;font-family:system-ui,sans-serif;color:#e8ecf5}
 #hud{position:fixed;top:12px;left:12px;font-size:18px;z-index:2;text-shadow:0 1px 3px #000}
 #msg{position:fixed;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;background:rgba(8,10,16,.82);z-index:3;text-align:center}
 #msg h1{font-size:42px;margin:0 0 6px;color:#f4c542}#msg button{margin-top:18px;padding:10px 22px;font-size:18px;border:0;border-radius:8px;background:#7b6cff;color:#fff;cursor:pointer}
 .rw{margin-top:10px;color:#f4c542;font-size:20px}.hub{margin-top:14px;color:#8a93a8;font-size:14px;text-decoration:none}
 #hint{position:fixed;bottom:12px;left:12px;font-size:13px;color:#8a93a8;z-index:2}
</style></head>
<body>
<div id="hud">Score: <span id="score">0</span></div>
<div id="hint">Arrow keys / WASD to move · survive the meteor storm</div>
<div id="msg"><h1>Obliterated!</h1><div id="sub"></div><div id="reward" class="rw"></div><button onclick="restart()">Play Again</button><a class="hub" href="/games">← All Games</a></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const GAMEKEY='meteor';
async function reward(sc){try{const r=await fetch('/api/arcade3d/reward',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({game:GAMEKEY,score:Math.max(0,Math.round(sc))})});const d=await r.json();if(d.ok)document.getElementById('reward').innerHTML='🪙 +'+d.gold_won+' gold'+(d.gear?'<br>🎁 '+d.gear:'');}catch(e){}}
const B=14;let scene,camera,renderer,ship,rocks,score,alive,t,keys={};
function init(){
 scene=new THREE.Scene();scene.fog=new THREE.Fog(0x0b0e16,30,70);
 camera=new THREE.PerspectiveCamera(55,innerWidth/innerHeight,.1,200);camera.position.set(0,26,22);camera.lookAt(0,0,0);
 renderer=new THREE.WebGLRenderer({antialias:true});renderer.setSize(innerWidth,innerHeight);document.body.appendChild(renderer.domElement);
 scene.add(new THREE.AmbientLight(0x8899bb,.7));const dl=new THREE.DirectionalLight(0xffffff,.8);dl.position.set(8,24,10);scene.add(dl);
 const g=new THREE.Mesh(new THREE.BoxGeometry(B*2+4,.5,B*2+4),new THREE.MeshStandardMaterial({color:0x14253a}));g.position.y=-.25;scene.add(g);
 ship=new THREE.Mesh(new THREE.ConeGeometry(.9,2,5),new THREE.MeshStandardMaterial({color:0x5bc0ff,emissive:0x123}));ship.position.y=.7;scene.add(ship);
 addEventListener('keydown',e=>keys[e.key.toLowerCase()]=true);addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);
 addEventListener('resize',onResize);restart();
}
function onResize(){camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);}
function restart(){rocks&&rocks.forEach(r=>scene.remove(r));rocks=[];score=0;alive=true;t=0;ship.position.set(0,.7,0);document.getElementById('score').textContent=0;document.getElementById('msg').style.display='none';}
function spawn(){const r=new THREE.Mesh(new THREE.DodecahedronGeometry(.7+Math.random()*.8),new THREE.MeshStandardMaterial({color:0xe2575b,emissive:0x300,flatShading:true}));r.position.set((Math.random()-.5)*B*2,24,(Math.random()-.5)*B*2);r.userData={v:.25+Math.random()*.25,sx:(Math.random()-.5)*.04,sy:(Math.random()-.5)*.04};scene.add(r);rocks.push(r);}
function update(){
 t++;if(t%Math.max(8,26-Math.floor(score/30))===0)spawn();
 const s=.42;if(keys['arrowleft']||keys['a'])ship.position.x=Math.max(-B,ship.position.x-s);if(keys['arrowright']||keys['d'])ship.position.x=Math.min(B,ship.position.x+s);
 if(keys['arrowup']||keys['w'])ship.position.z=Math.max(-B,ship.position.z-s);if(keys['arrowdown']||keys['s'])ship.position.z=Math.min(B,ship.position.z+s);
 for(let i=rocks.length-1;i>=0;i--){const r=rocks[i];r.position.y-=r.userData.v;r.rotation.x+=r.userData.sx*4;r.rotation.y+=r.userData.sy*4;
  if(r.position.y<1.2&&Math.hypot(r.position.x-ship.position.x,r.position.z-ship.position.z)<1.5)return gameOver();
  if(r.position.y<-1){scene.remove(r);rocks.splice(i,1);score+=5;document.getElementById('score').textContent=score;}}
}
function gameOver(){alive=false;document.getElementById('sub').textContent='Score: '+score;reward(score);document.getElementById('msg').style.display='flex';}
function loop(){requestAnimationFrame(loop);if(alive)update();ship.rotation.y+=.04;renderer.render(scene,camera);}
init();loop();
</script></body></html>
