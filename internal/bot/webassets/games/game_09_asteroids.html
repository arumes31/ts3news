<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Asteroids</title>
<style>
 html,body{margin:0;height:100%;overflow:hidden;background:#06080f;font-family:system-ui,sans-serif;color:#e8ecf5}
 #hud{position:fixed;top:12px;left:12px;font-size:18px;z-index:2;text-shadow:0 1px 3px #000}
 #msg{position:fixed;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;background:rgba(8,10,16,.82);z-index:3;text-align:center}
 #msg h1{font-size:42px;margin:0 0 6px;color:#f4c542}#msg button{margin-top:18px;padding:10px 22px;font-size:18px;border:0;border-radius:8px;background:#7b6cff;color:#fff;cursor:pointer}
 .rw{margin-top:10px;color:#f4c542;font-size:20px}.hub{margin-top:14px;color:#8a93a8;font-size:14px;text-decoration:none}
 #hint{position:fixed;bottom:12px;left:12px;font-size:13px;color:#8a93a8;z-index:2}
</style></head>
<body>
<div id="hud">Score: <span id="score">0</span></div>
<div id="hint">←/→ rotate · ↑ thrust · Space fire</div>
<div id="msg"><h1>Ship Lost</h1><div id="sub"></div><div id="reward" class="rw"></div><button onclick="restart()">Play Again</button><a class="hub" href="/games">← All Games</a></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const GAMEKEY='asteroids';
async function reward(sc){try{const r=await fetch('/api/arcade3d/reward',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({game:GAMEKEY,score:Math.max(0,Math.round(sc))})});const d=await r.json();if(d.ok)document.getElementById('reward').innerHTML='🪙 +'+d.gold_won+' gold'+(d.gear?'<br>🎁 '+d.gear:'');}catch(e){}}
const LIM=18;let scene,camera,renderer,ship,rocks,bullets,vel,score,alive,keys={},cool;
function init(){
 scene=new THREE.Scene();camera=new THREE.PerspectiveCamera(55,innerWidth/innerHeight,.1,200);camera.position.set(0,34,0.01);camera.lookAt(0,0,0);
 renderer=new THREE.WebGLRenderer({antialias:true});renderer.setSize(innerWidth,innerHeight);document.body.appendChild(renderer.domElement);
 scene.add(new THREE.AmbientLight(0x8899bb,.8));const dl=new THREE.DirectionalLight(0xffffff,.6);dl.position.set(2,10,4);scene.add(dl);
 for(let i=0;i<150;i++){const s=new THREE.Mesh(new THREE.SphereGeometry(.05,4,4),new THREE.MeshBasicMaterial({color:0x445}));s.position.set((Math.random()-.5)*48,-2,(Math.random()-.5)*48);scene.add(s);}
 ship=new THREE.Mesh(new THREE.ConeGeometry(.7,1.8,3),new THREE.MeshStandardMaterial({color:0x5bc0ff,emissive:0x123}));ship.rotation.x=Math.PI/2;scene.add(ship);
 addEventListener('keydown',e=>{keys[e.key.toLowerCase()]=true;if(e.key===' ')e.preventDefault();});addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);
 addEventListener('resize',onResize);restart();
}
function onResize(){camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);}
function mkRock(x,z,sz){const r=new THREE.Mesh(new THREE.DodecahedronGeometry(sz),new THREE.MeshStandardMaterial({color:0x9aa4bb,flatShading:true,emissive:0x111}));r.position.set(x,0,z);r.userData={vx:(Math.random()-.5)*.12,vz:(Math.random()-.5)*.12,sz};scene.add(r);rocks.push(r);}
function restart(){rocks&&rocks.forEach(r=>scene.remove(r));bullets&&bullets.forEach(b=>scene.remove(b));rocks=[];bullets=[];vel={x:0,z:0};score=0;alive=true;cool=0;ship.position.set(0,0,0);ship.rotation.z=0;for(let i=0;i<5;i++)mkRock((Math.random()-.5)*30,(Math.random()-.5)*30,1.8);document.getElementById('score').textContent=0;document.getElementById('msg').style.display='none';}
function wrap(o){if(o.position.x>LIM)o.position.x=-LIM;if(o.position.x<-LIM)o.position.x=LIM;if(o.position.z>LIM)o.position.z=-LIM;if(o.position.z<-LIM)o.position.z=LIM;}
function fire(){const a=ship.rotation.z;const b=new THREE.Mesh(new THREE.SphereGeometry(.2,8,8),new THREE.MeshBasicMaterial({color:0xf4c542}));b.position.copy(ship.position);b.userData={vx:-Math.sin(a)*.7,vz:-Math.cos(a)*.7,life:60};scene.add(b);bullets.push(b);cool=10;}
function update(){
 if(keys['arrowleft']||keys['a'])ship.rotation.z+=.08;if(keys['arrowright']||keys['d'])ship.rotation.z-=.08;
 if(keys['arrowup']||keys['w']){vel.x+=-Math.sin(ship.rotation.z)*.02;vel.z+=-Math.cos(ship.rotation.z)*.02;}
 if(cool>0)cool--;if(keys[' ']&&cool<=0)fire();
 vel.x*=.99;vel.z*=.99;ship.position.x+=vel.x;ship.position.z+=vel.z;wrap(ship);
 rocks.forEach(r=>{r.position.x+=r.userData.vx;r.position.z+=r.userData.vz;r.rotation.x+=.02;r.rotation.y+=.02;wrap(r);if(r.position.distanceTo(ship.position)<r.userData.sz+.6)gameOver();});
 for(let i=bullets.length-1;i>=0;i--){const b=bullets[i];b.position.x+=b.userData.vx;b.position.z+=b.userData.vz;wrap(b);if(--b.userData.life<0){scene.remove(b);bullets.splice(i,1);continue;}
  for(let j=rocks.length-1;j>=0;j--){if(b.position.distanceTo(rocks[j].position)<rocks[j].userData.sz){const rk=rocks[j];score+=20;document.getElementById('score').textContent=score;scene.remove(b);bullets.splice(i,1);if(rk.userData.sz>1){mkRock(rk.position.x,rk.position.z,rk.userData.sz*.55);mkRock(rk.position.x,rk.position.z,rk.userData.sz*.55);}scene.remove(rk);rocks.splice(j,1);break;}}}
 if(rocks.length===0)for(let i=0;i<6;i++)mkRock((Math.random()-.5)*30,(Math.random()-.5)*30,1.8);
}
function gameOver(){alive=false;document.getElementById('sub').textContent='Score: '+score;reward(score);document.getElementById('msg').style.display='flex';}
function loop(){requestAnimationFrame(loop);if(alive)update();renderer.render(scene,camera);}
init();loop();
</script></body></html>
