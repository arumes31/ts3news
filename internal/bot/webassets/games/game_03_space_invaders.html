<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Voxel Space Invaders</title>
<style>
 html,body{margin:0;height:100%;overflow:hidden;background:#06080f;font-family:system-ui,sans-serif;color:#e8ecf5}
 #hud{position:fixed;top:12px;left:12px;font-size:18px;z-index:2;text-shadow:0 1px 3px #000}
 #msg{position:fixed;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;background:rgba(8,10,16,.8);z-index:3;text-align:center}
 #msg h1{font-size:42px;margin:0 0 6px;color:#f4c542}#msg button{margin-top:18px;padding:10px 22px;font-size:18px;border:0;border-radius:8px;background:#7b6cff;color:#fff;cursor:pointer}
 #hint{position:fixed;bottom:12px;left:12px;font-size:13px;color:#8a93a8;z-index:2}
</style></head>
<body>
<div id="hud">Score: <span id="score">0</span> · Wave <span id="wave">1</span></div>
<div id="hint">←/→ move · Space to fire</div>
<div id="msg"><h1>Game Over</h1><div id="sub"></div><div id="reward" style="margin-top:10px;color:#f4c542;font-size:20px"></div><button onclick="restart()">Play Again</button><a href="/games" style="margin-top:14px;color:#8a93a8;font-size:14px">← All Games</a></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
async function reward(sc){try{const r=await fetch('/api/arcade3d/reward',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({game:'invaders',score:Math.max(0,Math.round(sc))})});const d=await r.json();if(d.ok)document.getElementById('reward').innerHTML='🪙 +'+d.gold_won+' gold'+(d.gear?'<br>🎁 '+d.gear:'');}catch(e){}}
let scene,camera,renderer,ship,enemies,bullets,ed,score,wave,alive,keys={},cool;
function init(){
 scene=new THREE.Scene();camera=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,.1,300);
 camera.position.set(0,6,26);camera.lookAt(0,2,0);
 renderer=new THREE.WebGLRenderer({antialias:true});renderer.setSize(innerWidth,innerHeight);document.body.appendChild(renderer.domElement);
 scene.add(new THREE.AmbientLight(0x99aacc,.7));const dl=new THREE.DirectionalLight(0xffffff,.7);dl.position.set(4,12,10);scene.add(dl);
 for(let i=0;i<120;i++){const s=new THREE.Mesh(new THREE.SphereGeometry(.06,4,4),new THREE.MeshBasicMaterial({color:0x556}));s.position.set((Math.random()-.5)*60,(Math.random()-.2)*30,-20-Math.random()*20);scene.add(s);}
 ship=new THREE.Mesh(new THREE.ConeGeometry(.9,2,4),new THREE.MeshStandardMaterial({color:0x5bc0ff,emissive:0x123}));ship.rotation.x=Math.PI/2;ship.position.set(0,0,12);scene.add(ship);
 addEventListener('keydown',e=>{keys[e.key.toLowerCase()]=true;if(e.key===' ')e.preventDefault();});addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);
 addEventListener('resize',onResize);restart();
}
function onResize(){camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);}
function spawnWave(){enemies.forEach(e=>scene.remove(e));enemies=[];for(let r=0;r<4;r++)for(let c=0;c<8;c++){const m=new THREE.Mesh(new THREE.BoxGeometry(1.2,1.2,1.2),new THREE.MeshStandardMaterial({color:[0xe2575b,0xf4c542,0x41c97a,0x7b6cff][r],emissive:0x111}));m.position.set(c*2.4-8.4,6-r*1.8,-2);scene.add(m);enemies.push(m);}ed=.06;}
function restart(){enemies=[];bullets=[];bullets.forEach&&0;score=0;wave=1;alive=true;cool=0;ship.position.x=0;document.getElementById('score').textContent=0;document.getElementById('wave').textContent=1;document.getElementById('msg').style.display='none';spawnWave();}
function fire(){const b=new THREE.Mesh(new THREE.SphereGeometry(.22,8,8),new THREE.MeshBasicMaterial({color:0xf4c542}));b.position.copy(ship.position);b.position.z-=1.5;scene.add(b);bullets.push(b);cool=12;}
function update(){
 if(keys['arrowleft']||keys['a'])ship.position.x=Math.max(-11,ship.position.x-.4);
 if(keys['arrowright']||keys['d'])ship.position.x=Math.min(11,ship.position.x+.4);
 if(cool>0)cool--;if((keys[' ']||keys['spacebar'])&&cool<=0)fire();
 let edge=false;enemies.forEach(e=>{e.position.x+=ed;if(e.position.x>11||e.position.x<-11)edge=true;e.rotation.y+=.02;});
 if(edge){ed*=-1;enemies.forEach(e=>{e.position.z+=1.2;if(e.position.z>=11)gameOver();});}
 for(let i=bullets.length-1;i>=0;i--){const b=bullets[i];b.position.z-=.9;if(b.position.z<-6){scene.remove(b);bullets.splice(i,1);continue;}
  for(let j=enemies.length-1;j>=0;j--){if(b.position.distanceTo(enemies[j].position)<1.1){scene.remove(enemies[j]);enemies.splice(j,1);scene.remove(b);bullets.splice(i,1);score+=10;document.getElementById('score').textContent=score;break;}}}
 if(enemies.length===0){wave++;document.getElementById('wave').textContent=wave;spawnWave();ed*=1+ .1*wave;}
}
function gameOver(){alive=false;document.getElementById('sub').textContent='Score: '+score;reward(score);document.getElementById('msg').style.display='flex';}
function loop(){requestAnimationFrame(loop);if(alive)update();renderer.render(scene,camera);}
init();loop();
</script></body></html>
