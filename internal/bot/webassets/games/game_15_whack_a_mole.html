<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Whack-a-Mole</title>
<style>
 html,body{margin:0;height:100%;overflow:hidden;background:#0b0e16;font-family:system-ui,sans-serif;color:#e8ecf5}
 #hud{position:fixed;top:12px;left:12px;font-size:18px;z-index:2;text-shadow:0 1px 3px #000}
 #msg{position:fixed;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;background:rgba(8,10,16,.82);z-index:3;text-align:center}
 #msg h1{font-size:42px;margin:0 0 6px;color:#f4c542}#msg button{margin-top:18px;padding:10px 22px;font-size:18px;border:0;border-radius:8px;background:#7b6cff;color:#fff;cursor:pointer}
 .rw{margin-top:10px;color:#f4c542;font-size:20px}.hub{margin-top:14px;color:#8a93a8;font-size:14px;text-decoration:none}
 #hint{position:fixed;bottom:12px;left:12px;font-size:13px;color:#8a93a8;z-index:2}
</style></head>
<body>
<div id="hud">Score: <span id="score">0</span> · Time <span id="time">30</span>s</div>
<div id="hint">Arrow keys move cursor · Space to whack</div>
<div id="msg"><h1>Time!</h1><div id="sub"></div><div id="reward" class="rw"></div><button onclick="restart()">Play Again</button><a class="hub" href="/games">← All Games</a></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const GAMEKEY='whack';
async function reward(sc){try{const r=await fetch('/api/arcade3d/reward',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({game:GAMEKEY,score:Math.max(0,Math.round(sc))})});const d=await r.json();if(d.ok)document.getElementById('reward').innerHTML='🪙 +'+d.gold_won+' gold'+(d.gear?'<br>🎁 '+d.gear:'');}catch(e){}}
let scene,camera,renderer,holes,cursor,cr,cc,score,alive,timeLeft,last,moleT;
function init(){
 scene=new THREE.Scene();camera=new THREE.PerspectiveCamera(55,innerWidth/innerHeight,.1,200);camera.position.set(0,12,12);camera.lookAt(0,0,0);
 renderer=new THREE.WebGLRenderer({antialias:true});renderer.setSize(innerWidth,innerHeight);document.body.appendChild(renderer.domElement);
 scene.add(new THREE.AmbientLight(0xaabbdd,.8));const dl=new THREE.DirectionalLight(0xffffff,.7);dl.position.set(6,16,8);scene.add(dl);
 const g=new THREE.Mesh(new THREE.BoxGeometry(14,.5,14),new THREE.MeshStandardMaterial({color:0x274d2a}));g.position.y=-.25;scene.add(g);
 holes=[];for(let r=0;r<3;r++)for(let c=0;c<3;c++){const x=(c-1)*4,z=(r-1)*4;const ring=new THREE.Mesh(new THREE.CylinderGeometry(1.5,1.5,.3,24),new THREE.MeshStandardMaterial({color:0x1a120c}));ring.position.set(x,.05,z);scene.add(ring);const mole=new THREE.Mesh(new THREE.SphereGeometry(1,18,18),new THREE.MeshStandardMaterial({color:0xb5651d,emissive:0x301}));mole.position.set(x,-1.2,z);scene.add(mole);holes.push({mole,up:false,x,z,r,c,timer:0});}
 cursor=new THREE.Mesh(new THREE.TorusGeometry(1.7,.18,8,28),new THREE.MeshBasicMaterial({color:0xf4c542}));cursor.rotation.x=Math.PI/2;scene.add(cursor);
 addEventListener('keydown',key);addEventListener('resize',onResize);restart();
}
function onResize(){camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);}
function curHole(){return holes.find(h=>h.r===cr&&h.c===cc);}
function moveCursor(){const h=curHole();cursor.position.set(h.x,.3,h.z);}
function restart(){holes.forEach(h=>{h.up=false;h.timer=0;h.mole.position.y=-1.2;});score=0;alive=true;timeLeft=30;cr=1;cc=1;moveCursor();moleT=0;last=performance.now();document.getElementById('score').textContent=0;document.getElementById('time').textContent=30;document.getElementById('msg').style.display='none';}
function key(e){if(!alive)return;const k=e.key.toLowerCase();if(k==='arrowup'||k==='w')cr=Math.max(0,cr-1);else if(k==='arrowdown'||k==='s')cr=Math.min(2,cr+1);else if(k==='arrowleft'||k==='a')cc=Math.max(0,cc-1);else if(k==='arrowright'||k==='d')cc=Math.min(2,cc+1);else if(k===' '){const h=curHole();if(h.up){h.up=false;h.timer=0;h.mole.position.y=-1.2;score+=10;document.getElementById('score').textContent=score;}e.preventDefault();}moveCursor();}
function update(dt){
 timeLeft-=dt;if(timeLeft<=0){timeLeft=0;return gameOver();}document.getElementById('time').textContent=Math.ceil(timeLeft);
 moleT-=dt;if(moleT<=0){moleT=.6+Math.random()*.6;const down=holes.filter(h=>!h.up);if(down.length){const h=down[Math.floor(Math.random()*down.length)];h.up=true;h.timer=.9+Math.random()*.8;}}
 holes.forEach(h=>{const ty=h.up?.4:-1.2;h.mole.position.y+=(ty-h.mole.position.y)*.25;if(h.up){h.timer-=dt;if(h.timer<=0)h.up=false;}});
}
function gameOver(){alive=false;document.getElementById('sub').textContent='Score: '+score;reward(score);document.getElementById('msg').style.display='flex';}
function loop(t){requestAnimationFrame(loop);const dt=(t-last)/1000;last=t;if(alive)update(dt);cursor.rotation.z+=.04;renderer.render(scene,camera);}
init();requestAnimationFrame(loop);
</script></body></html>
