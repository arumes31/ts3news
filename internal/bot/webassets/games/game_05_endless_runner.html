<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Endless Runner</title>
<style>
 html,body{margin:0;height:100%;overflow:hidden;background:#0b0e16;font-family:system-ui,sans-serif;color:#e8ecf5}
 #hud{position:fixed;top:12px;left:12px;font-size:18px;z-index:2;text-shadow:0 1px 3px #000}
 #msg{position:fixed;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;background:rgba(8,10,16,.8);z-index:3;text-align:center}
 #msg h1{font-size:42px;margin:0 0 6px;color:#f4c542}#msg button{margin-top:18px;padding:10px 22px;font-size:18px;border:0;border-radius:8px;background:#7b6cff;color:#fff;cursor:pointer}
 #hint{position:fixed;bottom:12px;left:12px;font-size:13px;color:#8a93a8;z-index:2}
</style></head>
<body>
<div id="hud">Score: <span id="score">0</span></div>
<div id="hint">←/→ switch lane · Space/↑ jump</div>
<div id="msg"><h1>Crashed!</h1><div id="sub"></div><div id="reward" style="margin-top:10px;color:#f4c542;font-size:20px"></div><button onclick="restart()">Play Again</button><a href="/games" style="margin-top:14px;color:#8a93a8;font-size:14px">← All Games</a></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
async function reward(sc){try{const r=await fetch('/api/arcade3d/reward',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({game:'runner',score:Math.max(0,Math.round(sc))})});const d=await r.json();if(d.ok)document.getElementById('reward').innerHTML='🪙 +'+d.gold_won+' gold'+(d.gear?'<br>🎁 '+d.gear:'');}catch(e){}}
const LANE=[-3,0,3];let scene,camera,renderer,player,obs,lane,vy,score,spd,alive,t;
function init(){
 scene=new THREE.Scene();scene.fog=new THREE.Fog(0x0b0e16,25,60);
 camera=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,.1,200);camera.position.set(0,6,12);camera.lookAt(0,1,-10);
 renderer=new THREE.WebGLRenderer({antialias:true});renderer.setSize(innerWidth,innerHeight);document.body.appendChild(renderer.domElement);
 scene.add(new THREE.AmbientLight(0x99aacc,.7));const dl=new THREE.DirectionalLight(0xffffff,.8);dl.position.set(4,16,8);scene.add(dl);
 const track=new THREE.Mesh(new THREE.BoxGeometry(11,.4,200),new THREE.MeshStandardMaterial({color:0x1a2030}));track.position.set(0,-.2,-80);scene.add(track);
 player=new THREE.Mesh(new THREE.BoxGeometry(1.4,1.4,1.4),new THREE.MeshStandardMaterial({color:0x5bc0ff,emissive:0x123}));scene.add(player);
 addEventListener('keydown',key);addEventListener('resize',onResize);restart();
}
function onResize(){camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);}
function restart(){obs&&obs.forEach(o=>scene.remove(o));obs=[];lane=1;vy=0;score=0;spd=.5;alive=true;t=0;player.position.set(0,.7,4);document.getElementById('score').textContent=0;document.getElementById('msg').style.display='none';}
function key(e){if(!alive)return;const k=e.key.toLowerCase();if((k==='arrowleft'||k==='a')&&lane>0)lane--;else if((k==='arrowright'||k==='d')&&lane<2)lane++;else if((k===' '||k==='arrowup'||k==='w')&&player.position.y<=.75){vy=.42;}}
function spawn(){const l=Math.floor(Math.random()*3);const o=new THREE.Mesh(new THREE.BoxGeometry(1.6,1.6,1.6),new THREE.MeshStandardMaterial({color:0xe2575b,emissive:0x300}));o.position.set(LANE[l],.8,-90);scene.add(o);obs.push(o);}
function update(){
 t++;if(t%Math.max(14,40-Math.floor(score/200))===0)spawn();
 player.position.x+=(LANE[lane]-player.position.x)*.25;
 vy-=.035;player.position.y+=vy;if(player.position.y<.7){player.position.y=.7;vy=0;}player.rotation.x-=.04;
 for(let i=obs.length-1;i>=0;i--){const o=obs[i];o.position.z+=spd;o.rotation.y+=.03;if(o.position.z>10){scene.remove(o);obs.splice(i,1);score+=10;document.getElementById('score').textContent=score;continue;}
  if(Math.abs(o.position.z-player.position.z)<1.3&&Math.abs(o.position.x-player.position.x)<1.5&&player.position.y<1.6)gameOver();}
 spd=.5+score*.0006;
}
function gameOver(){alive=false;document.getElementById('sub').textContent='Score: '+score;reward(score);document.getElementById('msg').style.display='flex';}
function loop(){requestAnimationFrame(loop);if(alive)update();renderer.render(scene,camera);}
init();loop();
</script></body></html>
