<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Missile Command</title>
<style>
 html,body{margin:0;height:100%;overflow:hidden;background:#07090f;font-family:system-ui,sans-serif;color:#e8ecf5}
 #hud{position:fixed;top:12px;left:12px;font-size:18px;z-index:2;text-shadow:0 1px 3px #000}
 #msg{position:fixed;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;background:rgba(8,10,16,.82);z-index:3;text-align:center}
 #msg h1{font-size:42px;margin:0 0 6px;color:#f4c542}#msg button{margin-top:18px;padding:10px 22px;font-size:18px;border:0;border-radius:8px;background:#7b6cff;color:#fff;cursor:pointer}
 .rw{margin-top:10px;color:#f4c542;font-size:20px}.hub{margin-top:14px;color:#8a93a8;font-size:14px;text-decoration:none}
 #hint{position:fixed;bottom:12px;left:12px;font-size:13px;color:#8a93a8;z-index:2}
</style></head>
<body>
<div id="hud">Score: <span id="score">0</span> · Cities <span id="cities">6</span></div>
<div id="hint">←/→/↑/↓ aim · Space launch interceptor</div>
<div id="msg"><h1>Cities Lost</h1><div id="sub"></div><div id="reward" class="rw"></div><button onclick="restart()">Play Again</button><a class="hub" href="/games">← All Games</a></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const GAMEKEY='missile';
async function reward(sc){try{const r=await fetch('/api/arcade3d/reward',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({game:GAMEKEY,score:Math.max(0,Math.round(sc))})});const d=await r.json();if(d.ok)document.getElementById('reward').innerHTML='🪙 +'+d.gold_won+' gold'+(d.gear?'<br>🎁 '+d.gear:'');}catch(e){}}
let scene,camera,renderer,cross,cities,missiles,booms,interceptors,score,alive,t,keys={},cool;
function init(){
 scene=new THREE.Scene();camera=new THREE.PerspectiveCamera(55,innerWidth/innerHeight,.1,300);camera.position.set(0,8,34);camera.lookAt(0,6,0);
 renderer=new THREE.WebGLRenderer({antialias:true});renderer.setSize(innerWidth,innerHeight);document.body.appendChild(renderer.domElement);
 scene.add(new THREE.AmbientLight(0x8899bb,.8));const dl=new THREE.DirectionalLight(0xffffff,.7);dl.position.set(4,16,10);scene.add(dl);
 const ground=new THREE.Mesh(new THREE.BoxGeometry(60,1,6),new THREE.MeshStandardMaterial({color:0x223040}));ground.position.set(0,-.5,0);scene.add(ground);
 cross=new THREE.Mesh(new THREE.TorusGeometry(.7,.12,8,20),new THREE.MeshBasicMaterial({color:0x41c97a}));cross.position.set(0,12,0);scene.add(cross);
 addEventListener('keydown',e=>{keys[e.key.toLowerCase()]=true;if(e.key===' ')e.preventDefault();});addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);
 addEventListener('resize',onResize);restart();
}
function onResize(){camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);}
function restart(){cities&&cities.forEach(c=>scene.remove(c.m));missiles&&missiles.forEach(m=>scene.remove(m.m));booms&&booms.forEach(b=>scene.remove(b.m));interceptors&&interceptors.forEach(i=>scene.remove(i.m));
 cities=[];missiles=[];booms=[];interceptors=[];score=0;alive=true;t=0;cool=0;cross.position.set(0,12,0);
 for(let i=0;i<6;i++){const m=new THREE.Mesh(new THREE.BoxGeometry(3,2,4),new THREE.MeshStandardMaterial({color:0x5bc0ff,emissive:0x123}));m.position.set(-22+i*8.8,1,0);scene.add(m);cities.push({m,alive:true});}
 document.getElementById('score').textContent=0;document.getElementById('cities').textContent=6;document.getElementById('msg').style.display='none';
}
function spawnMissile(){const sx=(Math.random()-.5)*50;const live=cities.filter(c=>c.alive);if(!live.length)return;const tgt=live[Math.floor(Math.random()*live.length)].m.position;const m=new THREE.Mesh(new THREE.ConeGeometry(.4,1.6,6),new THREE.MeshStandardMaterial({color:0xe2575b,emissive:0x300}));m.position.set(sx,30,0);const dir=new THREE.Vector3(tgt.x-sx,1-30,0).normalize().multiplyScalar(.12+Math.random()*.06);scene.add(m);missiles.push({m,v:dir});}
function explode(p){const m=new THREE.Mesh(new THREE.SphereGeometry(.5,16,16),new THREE.MeshBasicMaterial({color:0xf4c542,transparent:true,opacity:.8}));m.position.copy(p);scene.add(m);booms.push({m,r:.5});}
function update(){
 t++;if(t%Math.max(30,90-Math.floor(score/40))===0)spawnMissile();
 const s=.5;if(keys['arrowleft']||keys['a'])cross.position.x-=s;if(keys['arrowright']||keys['d'])cross.position.x+=s;
 if(keys['arrowup']||keys['w'])cross.position.y=Math.min(28,cross.position.y+s);if(keys['arrowdown']||keys['s'])cross.position.y=Math.max(3,cross.position.y-s);
 cross.position.x=Math.max(-28,Math.min(28,cross.position.x));
 if(cool>0)cool--;if(keys[' ']&&cool<=0){const tp=cross.position.clone();const m=new THREE.Mesh(new THREE.SphereGeometry(.25,8,8),new THREE.MeshBasicMaterial({color:0x41c97a}));m.position.set(0,1,0);scene.add(m);interceptors.push({m,t:tp,v:new THREE.Vector3(tp.x,tp.y-1,0).normalize().multiplyScalar(.7)});cool=14;}
 interceptors.forEach((it,i)=>{it.m.position.add(it.v);if(it.m.position.distanceTo(it.t)<.8){explode(it.t);scene.remove(it.m);interceptors.splice(i,1);}});
 missiles.forEach((mi,i)=>{mi.m.position.add(mi.v);if(mi.m.position.y<=1.2){hitCity(mi.m.position.x);scene.remove(mi.m);missiles.splice(i,1);}});
 booms.forEach((b,i)=>{b.r+=.18;b.m.scale.setScalar(b.r*2);b.m.material.opacity=Math.max(0,.8-b.r*.18);
  missiles.forEach((mi,j)=>{if(mi.m.position.distanceTo(b.m.position)<b.r*2){score+=25;document.getElementById('score').textContent=score;scene.remove(mi.m);missiles.splice(j,1);}});
  if(b.r>4){scene.remove(b.m);booms.splice(i,1);}});
}
function hitCity(x){let best=null,bd=99;cities.forEach(c=>{if(c.alive){const d=Math.abs(c.m.position.x-x);if(d<bd){bd=d;best=c;}}});if(best&&bd<4){best.alive=false;best.m.material.color.set(0x333);best.m.scale.y=.3;const n=cities.filter(c=>c.alive).length;document.getElementById('cities').textContent=n;if(n<=0)gameOver();}}
function gameOver(){alive=false;document.getElementById('sub').textContent='Score: '+score;reward(score);document.getElementById('msg').style.display='flex';}
function loop(){requestAnimationFrame(loop);if(alive)update();cross.rotation.z+=.03;renderer.render(scene,camera);}
init();loop();
</script></body></html>
