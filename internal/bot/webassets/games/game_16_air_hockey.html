<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Air Hockey</title>
<style>
 html,body{margin:0;height:100%;overflow:hidden;background:#0b0e16;font-family:system-ui,sans-serif;color:#e8ecf5}
 #hud{position:fixed;top:12px;left:12px;font-size:18px;z-index:2;text-shadow:0 1px 3px #000}
 #msg{position:fixed;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;background:rgba(8,10,16,.82);z-index:3;text-align:center}
 #msg h1{font-size:42px;margin:0 0 6px;color:#f4c542}#msg button{margin-top:18px;padding:10px 22px;font-size:18px;border:0;border-radius:8px;background:#7b6cff;color:#fff;cursor:pointer}
 .rw{margin-top:10px;color:#f4c542;font-size:20px}.hub{margin-top:14px;color:#8a93a8;font-size:14px;text-decoration:none}
 #hint{position:fixed;bottom:12px;left:12px;font-size:13px;color:#8a93a8;z-index:2}
</style></head>
<body>
<div id="hud">You <span id="ps">0</span> — <span id="as">0</span> CPU</div>
<div id="hint">Arrow keys / WASD to move your mallet · first to 7</div>
<div id="msg"><h1>Game Over</h1><div id="sub"></div><div id="reward" class="rw"></div><button onclick="restart()">Play Again</button><a class="hub" href="/games">← All Games</a></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const GAMEKEY='hockey';
async function reward(sc){try{const r=await fetch('/api/arcade3d/reward',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({game:GAMEKEY,score:Math.max(0,Math.round(sc))})});const d=await r.json();if(d.ok)document.getElementById('reward').innerHTML='🪙 +'+d.gold_won+' gold'+(d.gear?'<br>🎁 '+d.gear:'');}catch(e){}}
const W=10,L=16;let scene,camera,renderer,you,cpu,puck,pv,ps,as,alive,keys={};
function init(){
 scene=new THREE.Scene();camera=new THREE.PerspectiveCamera(55,innerWidth/innerHeight,.1,200);camera.position.set(0,20,15);camera.lookAt(0,0,0);
 renderer=new THREE.WebGLRenderer({antialias:true});renderer.setSize(innerWidth,innerHeight);document.body.appendChild(renderer.domElement);
 scene.add(new THREE.AmbientLight(0xaabbdd,.8));const dl=new THREE.DirectionalLight(0xffffff,.7);dl.position.set(4,18,6);scene.add(dl);
 const table=new THREE.Mesh(new THREE.BoxGeometry(W*2,.4,L*2),new THREE.MeshStandardMaterial({color:0x123a52}));table.position.y=-.2;scene.add(table);
 const line=new THREE.Mesh(new THREE.BoxGeometry(W*2,.05,.3),new THREE.MeshBasicMaterial({color:0x5bc0ff}));line.position.y=.21;scene.add(line);
 you=mallet(0x5bc0ff);you.position.set(0,.5,L-2);cpu=mallet(0xe2575b);cpu.position.set(0,.5,-(L-2));
 puck=new THREE.Mesh(new THREE.CylinderGeometry(.7,.7,.4,24),new THREE.MeshStandardMaterial({color:0xf4c542,emissive:0x442f00}));scene.add(puck);
 addEventListener('keydown',e=>keys[e.key.toLowerCase()]=true);addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);
 addEventListener('resize',onResize);restart();
}
function mallet(c){const m=new THREE.Mesh(new THREE.CylinderGeometry(1.1,1.1,.7,24),new THREE.MeshStandardMaterial({color:c,emissive:c&0x222222}));scene.add(m);return m;}
function onResize(){camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);}
function serve(d){puck.position.set(0,.4,0);pv={x:(Math.random()-.5)*.2,z:.2*d};}
function restart(){ps=0;as=0;alive=true;you.position.set(0,.5,L-2);cpu.position.set(0,.5,-(L-2));document.getElementById('ps').textContent=0;document.getElementById('as').textContent=0;document.getElementById('msg').style.display='none';serve(1);}
function clamp(o,zmin,zmax){o.position.x=Math.max(-W+1,Math.min(W-1,o.position.x));o.position.z=Math.max(zmin,Math.min(zmax,o.position.z));}
function update(){
 const s=.5;if(keys['arrowleft']||keys['a'])you.position.x-=s;if(keys['arrowright']||keys['d'])you.position.x+=s;if(keys['arrowup']||keys['w'])you.position.z-=s;if(keys['arrowdown']||keys['s'])you.position.z+=s;clamp(you,1,L-1);
 cpu.position.x+=(puck.position.x-cpu.position.x)*.06;cpu.position.z+=((puck.position.z<0?puck.position.z:-(L-3))-cpu.position.z)*.05;clamp(cpu,-(L-1),-1);
 puck.position.x+=pv.x;puck.position.z+=pv.z;
 if(puck.position.x>W-.7||puck.position.x<-W+.7)pv.x*=-1;
 [you,cpu].forEach(m=>{const dx=puck.position.x-m.position.x,dz=puck.position.z-m.position.z,d=Math.hypot(dx,dz);if(d<1.8){const n=1/(d||1);pv.x=dx*n*.5;pv.z=dz*n*.5;}});
 if(puck.position.z>L){if(Math.abs(puck.position.x)<3.5){as++;document.getElementById('as').textContent=as;chk(-1);}else{pv.z*=-1;puck.position.z=L-.1;}}
 else if(puck.position.z<-L){if(Math.abs(puck.position.x)<3.5){ps++;document.getElementById('ps').textContent=ps;chk(1);}else{pv.z*=-1;puck.position.z=-L+.1;}}
}
function chk(d){if(ps>=7||as>=7){alive=false;document.getElementById('sub').textContent=ps>=7?'You win!':'CPU wins.';reward(ps*55+as*8);document.getElementById('msg').style.display='flex';}else serve(d);}
function loop(){requestAnimationFrame(loop);if(alive)update();renderer.render(scene,camera);}
init();loop();
</script></body></html>
