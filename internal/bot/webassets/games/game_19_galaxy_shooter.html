<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Galaxy Shooter</title>
<style>
 html,body{margin:0;height:100%;overflow:hidden;background:#05070f;font-family:system-ui,sans-serif;color:#e8ecf5}
 #hud{position:fixed;top:12px;left:12px;font-size:18px;z-index:2;text-shadow:0 1px 3px #000}
 #msg{position:fixed;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;background:rgba(8,10,16,.82);z-index:3;text-align:center}
 #msg h1{font-size:42px;margin:0 0 6px;color:#f4c542}#msg button{margin-top:18px;padding:10px 22px;font-size:18px;border:0;border-radius:8px;background:#7b6cff;color:#fff;cursor:pointer}
 .rw{margin-top:10px;color:#f4c542;font-size:20px}.hub{margin-top:14px;color:#8a93a8;font-size:14px;text-decoration:none}
 #hint{position:fixed;bottom:12px;left:12px;font-size:13px;color:#8a93a8;z-index:2}
</style></head>
<body>
<div id="hud">Score: <span id="score">0</span> · HP <span id="hp">3</span></div>
<div id="hint">←/→ move · Space fire</div>
<div id="msg"><h1>Ship Down</h1><div id="sub"></div><div id="reward" class="rw"></div><button onclick="restart()">Play Again</button><a class="hub" href="/games">← All Games</a></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const GAMEKEY='galaxy';
async function reward(sc){try{const r=await fetch('/api/arcade3d/reward',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({game:GAMEKEY,score:Math.max(0,Math.round(sc))})});const d=await r.json();if(d.ok)document.getElementById('reward').innerHTML='🪙 +'+d.gold_won+' gold'+(d.gear?'<br>🎁 '+d.gear:'');}catch(e){}}
const LIM=14;let scene,camera,renderer,ship,enemies,bullets,score,hp,alive,keys={},cool,t;
function init(){
 scene=new THREE.Scene();camera=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,.1,200);camera.position.set(0,8,22);camera.lookAt(0,2,-2);
 renderer=new THREE.WebGLRenderer({antialias:true});renderer.setSize(innerWidth,innerHeight);document.body.appendChild(renderer.domElement);
 scene.add(new THREE.AmbientLight(0x99aacc,.8));const dl=new THREE.DirectionalLight(0xffffff,.6);dl.position.set(3,12,8);scene.add(dl);
 for(let i=0;i<160;i++){const s=new THREE.Mesh(new THREE.SphereGeometry(.05,4,4),new THREE.MeshBasicMaterial({color:0x556}));s.position.set((Math.random()-.5)*60,(Math.random()-.3)*30,-25-Math.random()*20);scene.add(s);}
 ship=new THREE.Mesh(new THREE.ConeGeometry(.9,2.2,5),new THREE.MeshStandardMaterial({color:0x5bc0ff,emissive:0x123}));ship.rotation.x=-Math.PI/2;ship.position.set(0,0,10);scene.add(ship);
 addEventListener('keydown',e=>{keys[e.key.toLowerCase()]=true;if(e.key===' ')e.preventDefault();});addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);
 addEventListener('resize',onResize);restart();
}
function onResize(){camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);}
function restart(){enemies&&enemies.forEach(e=>scene.remove(e));bullets&&bullets.forEach(b=>scene.remove(b));enemies=[];bullets=[];score=0;hp=3;alive=true;cool=0;t=0;ship.position.x=0;document.getElementById('score').textContent=0;document.getElementById('hp').textContent=3;document.getElementById('msg').style.display='none';}
function spawn(){const e=new THREE.Mesh(new THREE.IcosahedronGeometry(1),new THREE.MeshStandardMaterial({color:0xe2575b,emissive:0x300,flatShading:true}));e.position.set((Math.random()-.5)*LIM*2,0,-30);e.userData={x0:e.position.x,ph:Math.random()*6,sp:.12+Math.random()*.08+score*.0004};scene.add(e);enemies.push(e);}
function update(){
 t++;if(t%Math.max(16,40-Math.floor(score/30))===0)spawn();
 if(keys['arrowleft']||keys['a'])ship.position.x=Math.max(-LIM,ship.position.x-.45);if(keys['arrowright']||keys['d'])ship.position.x=Math.min(LIM,ship.position.x+.45);
 if(cool>0)cool--;if(keys[' ']&&cool<=0){const b=new THREE.Mesh(new THREE.SphereGeometry(.25,8,8),new THREE.MeshBasicMaterial({color:0xf4c542}));b.position.copy(ship.position);scene.add(b);bullets.push(b);cool=9;}
 for(let i=enemies.length-1;i>=0;i--){const e=enemies[i];e.position.z+=e.userData.sp;e.position.x=e.userData.x0+Math.sin(t*.04+e.userData.ph)*3;e.rotation.x+=.04;e.rotation.y+=.05;
  if(e.position.z>11){scene.remove(e);enemies.splice(i,1);continue;}
  if(Math.abs(e.position.z-ship.position.z)<1.6&&Math.abs(e.position.x-ship.position.x)<1.6){scene.remove(e);enemies.splice(i,1);hp--;document.getElementById('hp').textContent=hp;if(hp<=0)gameOver();continue;}}
 for(let i=bullets.length-1;i>=0;i--){const b=bullets[i];b.position.z-=.8;if(b.position.z<-32){scene.remove(b);bullets.splice(i,1);continue;}
  for(let j=enemies.length-1;j>=0;j--){if(b.position.distanceTo(enemies[j].position)<1.3){scene.remove(enemies[j]);enemies.splice(j,1);scene.remove(b);bullets.splice(i,1);score+=15;document.getElementById('score').textContent=score;break;}}}
}
function gameOver(){alive=false;document.getElementById('sub').textContent='Score: '+score;reward(score);document.getElementById('msg').style.display='flex';}
function loop(){requestAnimationFrame(loop);if(alive)update();renderer.render(scene,camera);}
init();loop();
</script></body></html>
