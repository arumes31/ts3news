<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Crossy Road</title>
<style>
 html,body{margin:0;height:100%;overflow:hidden;background:#0b0e16;font-family:system-ui,sans-serif;color:#e8ecf5}
 #hud{position:fixed;top:12px;left:12px;font-size:18px;z-index:2;text-shadow:0 1px 3px #000}
 #msg{position:fixed;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;background:rgba(8,10,16,.82);z-index:3;text-align:center}
 #msg h1{font-size:42px;margin:0 0 6px;color:#f4c542}#msg button{margin-top:18px;padding:10px 22px;font-size:18px;border:0;border-radius:8px;background:#7b6cff;color:#fff;cursor:pointer}
 .rw{margin-top:10px;color:#f4c542;font-size:20px}.hub{margin-top:14px;color:#8a93a8;font-size:14px;text-decoration:none}
 #hint{position:fixed;bottom:12px;left:12px;font-size:13px;color:#8a93a8;z-index:2}
</style></head>
<body>
<div id="hud">Score: <span id="score">0</span></div>
<div id="hint">↑ hop forward · ←/→ sidestep · keep going!</div>
<div id="msg"><h1>Splat!</h1><div id="sub"></div><div id="reward" class="rw"></div><button onclick="restart()">Play Again</button><a class="hub" href="/games">← All Games</a></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const GAMEKEY='crossy';
async function reward(sc){try{const r=await fetch('/api/arcade3d/reward',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({game:GAMEKEY,score:Math.max(0,Math.round(sc))})});const d=await r.json();if(d.ok)document.getElementById('reward').innerHTML='🪙 +'+d.gold_won+' gold'+(d.gear?'<br>🎁 '+d.gear:'');}catch(e){}}
const HALF=9;let scene,camera,renderer,player,world,rows,score,maxRow,alive,minZ;
function init(){
 scene=new THREE.Scene();scene.fog=new THREE.Fog(0x0b0e16,28,60);
 camera=new THREE.PerspectiveCamera(55,innerWidth/innerHeight,.1,200);
 renderer=new THREE.WebGLRenderer({antialias:true});renderer.setSize(innerWidth,innerHeight);document.body.appendChild(renderer.domElement);
 scene.add(new THREE.AmbientLight(0xaabbdd,.8));const dl=new THREE.DirectionalLight(0xffffff,.8);dl.position.set(6,20,10);scene.add(dl);
 world=new THREE.Group();scene.add(world);
 player=new THREE.Mesh(new THREE.BoxGeometry(.9,.9,.9),new THREE.MeshStandardMaterial({color:0xf4c542,emissive:0x442f00}));player.position.y=.5;scene.add(player);
 addEventListener('keydown',key);addEventListener('resize',onResize);restart();
}
function onResize(){camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);}
function makeRow(z){const safe=Math.random()<.35;const tile=new THREE.Mesh(new THREE.BoxGeometry(HALF*2+4,.3,1),new THREE.MeshStandardMaterial({color:safe?0x2a8a4a:0x20242f}));tile.position.set(0,0,z);world.add(tile);
 const row={z,safe,cars:[],dir:Math.random()<.5?1:-1,spd:.05+Math.random()*.09};
 if(!safe)for(let k=0;k<3;k++){const c=new THREE.Mesh(new THREE.BoxGeometry(2,.9,.8),new THREE.MeshStandardMaterial({color:[0xe2575b,0x5bc0ff,0xb060ff][k%3]}));c.position.set(-HALF+k*((HALF*2)/3)+Math.random()*3,.6,z);world.add(c);row.cars.push(c);}
 rows.push(row);minZ=z;}
function restart(){while(world.children.length)world.remove(world.children[0]);rows=[];minZ=5;for(let z=4;z>=-30;z--)makeRow(z);player.position.set(0,.5,0);score=0;maxRow=0;alive=true;document.getElementById('score').textContent=0;document.getElementById('msg').style.display='none';follow();}
function follow(){camera.position.set(0,12,player.position.z+12);camera.lookAt(0,0,player.position.z-6);}
function key(e){if(!alive)return;const k=e.key.toLowerCase();
 if(k==='arrowup'||k==='w'){player.position.z-=1;if(-player.position.z>maxRow){maxRow=-player.position.z;score=maxRow;document.getElementById('score').textContent=score;}while(player.position.z-20<minZ)makeRow(minZ-1);}
 else if(k==='arrowleft'||k==='a')player.position.x=Math.max(-HALF,player.position.x-1);
 else if(k==='arrowright'||k==='d')player.position.x=Math.min(HALF,player.position.x+1);
 else if(k==='arrowdown'||k==='s')player.position.z=Math.min(4,player.position.z+1);
 follow();}
function update(){rows.forEach(r=>{if(r.safe)return;r.cars.forEach(c=>{c.position.x+=r.spd*r.dir;if(c.position.x>HALF+3)c.position.x=-HALF-3;if(c.position.x<-HALF-3)c.position.x=HALF+3;
  if(Math.abs(c.position.z-player.position.z)<.7&&Math.abs(c.position.x-player.position.x)<1.4)gameOver();});});}
function gameOver(){alive=false;document.getElementById('sub').textContent='Score: '+score;reward(score*6);document.getElementById('msg').style.display='flex';}
function loop(){requestAnimationFrame(loop);if(alive)update();renderer.render(scene,camera);}
init();loop();
</script></body></html>
