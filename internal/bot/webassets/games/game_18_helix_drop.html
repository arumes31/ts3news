<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Helix Drop</title>
<style>
 html,body{margin:0;height:100%;overflow:hidden;background:#0b0e16;font-family:system-ui,sans-serif;color:#e8ecf5}
 #hud{position:fixed;top:12px;left:12px;font-size:18px;z-index:2;text-shadow:0 1px 3px #000}
 #msg{position:fixed;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;background:rgba(8,10,16,.82);z-index:3;text-align:center}
 #msg h1{font-size:42px;margin:0 0 6px;color:#f4c542}#msg button{margin-top:18px;padding:10px 22px;font-size:18px;border:0;border-radius:8px;background:#7b6cff;color:#fff;cursor:pointer}
 .rw{margin-top:10px;color:#f4c542;font-size:20px}.hub{margin-top:14px;color:#8a93a8;font-size:14px;text-decoration:none}
 #hint{position:fixed;bottom:12px;left:12px;font-size:13px;color:#8a93a8;z-index:2}
</style></head>
<body>
<div id="hud">Score: <span id="score">0</span></div>
<div id="hint">←/→ or A/D rotate the tower · drop through gaps, avoid red</div>
<div id="msg"><h1>Splat!</h1><div id="sub"></div><div id="reward" class="rw"></div><button onclick="restart()">Play Again</button><a class="hub" href="/games">← All Games</a></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const GAMEKEY='helix';
async function reward(sc){try{const r=await fetch('/api/arcade3d/reward',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({game:GAMEKEY,score:Math.max(0,Math.round(sc))})});const d=await r.json();if(d.ok)document.getElementById('reward').innerHTML='🪙 +'+d.gold_won+' gold'+(d.gear?'<br>🎁 '+d.gear:'');}catch(e){}}
const M=16,R=4,LEVELS=10,GAPY=3.4;let scene,camera,renderer,tower,discs,ball,vy,level,score,alive,keys={};
function init(){
 scene=new THREE.Scene();scene.fog=new THREE.Fog(0x0b0e16,18,46);
 camera=new THREE.PerspectiveCamera(55,innerWidth/innerHeight,.1,200);
 renderer=new THREE.WebGLRenderer({antialias:true});renderer.setSize(innerWidth,innerHeight);document.body.appendChild(renderer.domElement);
 scene.add(new THREE.AmbientLight(0xaabbdd,.85));const dl=new THREE.DirectionalLight(0xffffff,.7);dl.position.set(6,12,10);scene.add(dl);
 const pole=new THREE.Mesh(new THREE.CylinderGeometry(.6,.6,LEVELS*GAPY+8,16),new THREE.MeshStandardMaterial({color:0x2a3147}));pole.position.y=-LEVELS*GAPY/2;scene.add(pole);
 tower=new THREE.Group();scene.add(tower);
 ball=new THREE.Mesh(new THREE.SphereGeometry(.7,20,20),new THREE.MeshStandardMaterial({color:0xf4c542,emissive:0x442f00}));scene.add(ball);
 addEventListener('keydown',e=>keys[e.key.toLowerCase()]=true);addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);
 addEventListener('resize',onResize);restart();
}
function onResize(){camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);}
function buildTower(){discs&&discs.forEach(d=>tower.remove(d.g));discs=[];
 for(let i=0;i<LEVELS;i++){const g=new THREE.Group();g.position.y=-i*GAPY;const slots=[];const gapStart=Math.floor(Math.random()*M),gapLen=3;
  for(let s=0;s<M;s++){let type='solid';if(s>=gapStart&&s<gapStart+gapLen)type='gap';else if(Math.random()<.18)type='red';slots.push(type);
   if(type==='gap')continue;const a=s/M*Math.PI*2;const b=new THREE.Mesh(new THREE.BoxGeometry(1.5,.6,1.5),new THREE.MeshStandardMaterial({color:type==='red'?0xe2575b:0x5bc0ff,emissive:type==='red'?0x300:0x113}));b.position.set(Math.cos(a)*R,0,Math.sin(a)*R);g.add(b);}
  tower.add(g);discs.push({g,slots});}
}
function restart(){tower.rotation.y=0;buildTower();ball.position.set(R,2,0);vy=0;level=0;score=0;alive=true;document.getElementById('score').textContent=0;document.getElementById('msg').style.display='none';}
function slotAt(disc){let a=Math.atan2(0,R)-tower.rotation.y;a=((a%(Math.PI*2))+Math.PI*2)%(Math.PI*2);return disc.slots[Math.floor(a/(Math.PI*2)*M)%M];}
function update(){
 if(keys['arrowleft']||keys['a'])tower.rotation.y+=.06;if(keys['arrowright']||keys['d'])tower.rotation.y-=.06;
 vy-=.02;ball.position.y+=vy;
 if(level<LEVELS){const dy=-level*GAPY;if(ball.position.y<=dy+.7&&ball.position.y>dy-.7&&vy<0){const t=slotAt(discs[level]);
   if(t==='red')return gameOver();
   if(t==='gap'){score+=10;document.getElementById('score').textContent=score;level++;}
   else{vy=.32;ball.position.y=dy+.7;}}}
 if(level>=LEVELS&&ball.position.y<-LEVELS*GAPY-1){score+=200;document.getElementById('score').textContent=score;restartKeepScore();}
 camera.position.set(0,ball.position.y+5,12);camera.lookAt(0,ball.position.y-2,0);
}
function restartKeepScore(){const s=score;tower.rotation.y=0;buildTower();ball.position.set(R,2,0);vy=0;level=0;score=s;}
function gameOver(){alive=false;document.getElementById('sub').textContent='Score: '+score;reward(score);document.getElementById('msg').style.display='flex';}
function loop(){requestAnimationFrame(loop);if(alive)update();renderer.render(scene,camera);}
init();loop();
</script></body></html>
