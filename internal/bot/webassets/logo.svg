<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 56" width="220" height="56" role="img" aria-label="TS3 RPG">
  <defs>
    <linearGradient id="blade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eef3ff"/><stop offset="1" stop-color="#9aa6c4"/>
    </linearGradient>
    <linearGradient id="word" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f4c542"/><stop offset="1" stop-color="#ffe08a"/>
    </linearGradient>
  </defs>

  <!-- emblem: shield + crossed swords -->
  <g transform="translate(28 28)">
    <path d="M0 -19 L17 -13 V3 C17 13 9.5 19 0 23 C-9.5 19 -17 13 -17 3 V-13 Z"
          fill="#1a1f2b" stroke="#7b6cff" stroke-width="2.4" stroke-linejoin="round"/>
    <g>
      <g transform="rotate(45)">
        <polygon points="0,-21 2,1 -2,1" fill="url(#blade)"/>
        <rect x="-7" y="1" width="14" height="3" rx="1.3" fill="#f4c542"/>
        <rect x="-1.5" y="4" width="3" height="7" rx="1.3" fill="#caa235"/>
        <circle cx="0" cy="12.5" r="2" fill="#f4c542"/>
      </g>
      <g transform="rotate(-45)">
        <polygon points="0,-21 2,1 -2,1" fill="url(#blade)"/>
        <rect x="-7" y="1" width="14" height="3" rx="1.3" fill="#f4c542"/>
        <rect x="-1.5" y="4" width="3" height="7" rx="1.3" fill="#caa235"/>
        <circle cx="0" cy="12.5" r="2" fill="#f4c542"/>
      </g>
    </g>
  </g>

  <!-- wordmark -->
  <text x="58" y="30" font-family="'Segoe UI',Roboto,system-ui,sans-serif" font-size="23" font-weight="800" fill="url(#word)" letter-spacing="1">TS3 RPG</text>
  <text x="59" y="46" font-family="'Segoe UI',Roboto,system-ui,sans-serif" font-size="10" font-weight="600" fill="#8a93a8" letter-spacing="3">FREE-GAME PORTAL</text>
</svg>
