<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#161b22;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="swordGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f6fc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b949e;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background Shield -->
  <path d="M256 32 C150 32 64 64 64 160 C64 280 128 400 256 480 C384 400 448 280 448 160 C448 64 362 32 256 32 Z" fill="url(#shieldGrad)" stroke="#30363d" stroke-width="16"/>
  
  <!-- "News" Lines (The Newspaper Part) -->
  <rect x="140" y="140" width="232" height="16" rx="8" fill="#484f58"/>
  <rect x="140" y="180" width="232" height="16" rx="8" fill="#484f58"/>
  <rect x="140" y="220" width="140" height="16" rx="8" fill="#484f58"/>
  
  <!-- Sword (The RPG Part) -->
  <g transform="translate(256, 320) rotate(-45)">
    <!-- Blade -->
    <path d="M-12,-160 L12,-160 L18,0 L-18,0 Z" fill="url(#swordGrad)" stroke="#c9d1d9" stroke-width="2"/>
    <path d="M0,-160 L0,0" stroke="#8b949e" stroke-width="2"/>
    <!-- Guard -->
    <path d="M-40,0 L40,0 L40,12 L-40,12 Z" fill="#d29922" stroke="#9a6700" stroke-width="2"/>
    <!-- Handle -->
    <rect x="-10" y="12" width="20" height="40" rx="4" fill="#8b4513" stroke="#5d2f0d" stroke-width="2"/>
    <!-- Pommel -->
    <circle cx="0" cy="56" r="10" fill="#d29922" stroke="#9a6700" stroke-width="2"/>
  </g>
</svg>
